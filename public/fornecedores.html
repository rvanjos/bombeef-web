<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fornecedores — Bom Beef</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/bb-theme.css">
<script src="/js/api.js"></script>
<style>
:root{--red:#8B0000;--red-l:#C0392B;--bg:#f7f4f0;--white:#fff;--text:#1a1a1a;--muted:#7a7068;--border:#e8e0d8;--shadow:0 2px 12px rgba(0,0,0,.08);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
.ph{background:var(--red);padding:11px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(139,0,0,.3);flex-shrink:0;}
.ph h2{font-family:'Playfair Display',serif;font-size:16px;color:#fff;font-weight:700;}
.ph-sub{font-size:11px;color:rgba(255,255,255,.65);margin-left:auto;}
.toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.search-box{flex:1;min-width:200px;max-width:340px;position:relative;}
.search-box input{width:100%;padding:7px 32px 7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--white);}
.search-box input:focus{outline:none;border-color:var(--red);}
.search-ico{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-p{background:var(--red);color:#fff;} .btn-p:hover{background:var(--red-l);}
.btn-s{background:var(--white);color:var(--text);border:1px solid var(--border);} .btn-s:hover{border-color:var(--red);color:var(--red);}
.btn-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;} .btn-danger:hover{background:#fca5a5;}
.filtro-ativo{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.filtro-ativo input{width:14px;height:14px;accent-color:var(--red);}
.content{padding:18px;overflow-y:auto;overflow-x:auto;flex:1;}
.empty{text-align:center;padding:48px 0;color:var(--muted);}
.empty-ico{font-size:40px;margin-bottom:10px;}
.count-label{font-size:11px;color:var(--muted);margin-left:auto;}

/* Tabela */
.tbl-wrap{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;}
thead th{background:#fdf9f5;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;padding:9px 12px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#fdf9f5;}
tbody td{padding:10px 12px;font-size:13px;vertical-align:middle;}
.td-nome{font-weight:600;}
.td-fantasia{font-size:11px;color:var(--muted);}
.td-cnpj{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}
.badge-ativo{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#dcfce7;color:#166534;}
.badge-inativo{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#fee2e2;color:#991b1b;}
.td-acoes{text-align:right;white-space:nowrap;}
.td-acoes button{padding:4px 10px;font-size:11px;border-radius:6px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--text);margin-left:4px;}
.td-acoes button:hover{border-color:var(--red);color:var(--red);}

/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
.mbg.open{display:flex;}
.md{background:var(--white);border-radius:14px;width:100%;max-width:820px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18);margin:16px;}
.md-head{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between;}
.md-head h3{font-family:'Playfair Display',serif;font-size:16px;color:var(--red);}
.md-head button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1;}
.md-body{padding:16px 20px;}
.md-foot{padding:12px 20px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--white);}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--red);}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;padding:8px 20px;border-radius:9px;font-size:13px;z-index:9999;transition:transform .3s;pointer-events:none;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── Abas de navegação ────────────────────────────────────── */
.nav-tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:14px;}
.nav-tab{padding:8px 18px;background:none;border:none;border-bottom:3px solid transparent;
  margin-bottom:-2px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);
  font-family:'DM Sans',sans-serif;transition:.15s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--red);border-bottom-color:var(--red)}

/* ── Catálogo ─────────────────────────────────────────────── */
.cat-forn-card{background:var(--white);border:1px solid var(--border);border-radius:12px;
  box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.cat-forn-head{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;
  background:var(--bg);border-bottom:1px solid var(--border)}
.cat-forn-head:hover{background:#f0ebe4}
.cat-forn-nome{font-size:13px;font-weight:700;flex:1}
.cat-forn-meta{font-size:11px;color:var(--muted)}
.cat-forn-body{display:none}
.cat-forn-body.open{display:block}
.cat-forn-search{padding:8px 12px;background:#faf9f7;border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<div class="ph">
  <span style="font-size:20px">🏭</span>
  <h2>Fornecedores</h2>
  <span class="ph-sub" id="ph-perfil"></span>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="mudarAba('fornecedores', this)">🏭 Fornecedores</button>
  <button class="nav-tab" onclick="mudarAba('catalogo', this)">📦 Catálogo de Produtos</button>
</div>
<div class="toolbar">
  <div class="search-box">
    <input type="text" id="inp-busca" placeholder="Buscar por nome, fantasia ou CNPJ..." oninput="buscar()">
    <span class="search-ico">🔍</span>
  </div>
  <label class="filtro-ativo">
    <input type="checkbox" id="chk-inativos" onchange="buscar()"> Mostrar inativos
  </label>
  <button class="btn btn-p" onclick="abrirNovo()">+ Novo Fornecedor</button>
  <button class="btn btn-s" onclick="dedupFornecedores()" style="background:#fff3cd;border-color:#ffc107;color:#856404" title="Remove fornecedores duplicados pelo mesmo CNPJ">🧹 Remover duplicatas</button>
  <span class="count-label" id="count-label"></span>
</div>

<div class="content">
    <!-- ABA: Fornecedores -->
    <div id="sec-fornecedores">
      <div id="lista-wrap"></div>
    </div>

    <!-- ABA: Catálogo de Produtos -->
    <div id="sec-catalogo" style="display:none">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
        <div class="search-box" style="flex:1;min-width:200px">
          <input type="text" id="cat-busca" placeholder="Buscar fornecedor…"
            oninput="filtrarCatalogo()" style="width:100%">
          <span class="search-ico">🔍</span>
        </div>
        <input type="text" id="cat-busca-prod" placeholder="Filtrar por produto…"
          oninput="filtrarCatalogo()"
          style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;width:180px">
        <button onclick="carregarCatalogo()" class="btn btn-s" style="height:36px">🔄 Atualizar</button>
        <button onclick="sincronizarHistorico()" class="btn btn-p" style="height:36px;padding:0 14px" id="btn-sinc-hist">⚡ Sincronizar histórico</button>
        <button onclick="expandirTodosForn()" class="btn btn-s" style="height:36px;padding:0 10px;font-size:11px">▼ Expandir todos</button>
        <button onclick="colapsarTodosForn()" class="btn btn-s" style="height:36px;padding:0 10px;font-size:11px">▶ Colapsar todos</button>
        <span id="cat-resumo" style="font-size:12px;color:var(--muted)"></span>
      </div>
      <div id="cat-wrap">
        <div style="text-align:center;padding:32px;color:var(--muted)">
          Clique em "Atualizar" para carregar o catálogo
        </div>
      </div>
    </div>
  </div>

<!-- Modal Fornecedor -->
<div class="mbg" id="m-forn" onclick="if(event.target===this)fechar()">
  <div class="md">
    <div class="md-head">
      <h3 id="m-titulo">Novo Fornecedor</h3>
      <button onclick="fechar()">×</button>
    </div>
    <div class="md-body">
      <div class="fg-row">
        <div class="fg">
          <label>CNPJ *</label>
          <input type="text" id="f-cnpj" placeholder="00.000.000/0000-00" maxlength="18" oninput="mascaraCNPJ(this)">
        </div>
        <div class="fg">
          <label>Categoria Padrão DRE</label>
          <select id="f-categoria">
            <option value="">— Selecione —</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label>Razão Social *</label>
        <input type="text" id="f-razao" placeholder="Razão social completa">
      </div>
      <div class="fg">
        <label>Nome Fantasia</label>
        <input type="text" id="f-fantasia" placeholder="Nome comercial (opcional)">
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Contato</label>
          <input type="text" id="f-contato" placeholder="Nome do responsável">
        </div>
        <div class="fg">
          <label>Telefone</label>
          <input type="text" id="f-telefone" placeholder="(19) 99999-9999">
        </div>
      </div>
      <div class="fg">
        <label>E-mail</label>
        <input type="email" id="f-email" placeholder="email@fornecedor.com.br">
      </div>
      <div class="fg">
        <label>Endereço</label>
        <input type="text" id="f-endereco" placeholder="Cidade / UF">
      </div>
      <div class="fg">
        <label>Observação</label>
        <textarea id="f-obs" rows="2" placeholder="Anotações internas..."></textarea>
      </div>
      <div class="fg" id="fg-ativo" style="display:none">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="f-ativo" checked> Fornecedor ativo
        </label>
      </div>
    </div>
    <!-- Painel de Produtos Fornecidos (visível só ao editar) -->
    <div id="forn-prod-panel" style="display:none;border-top:1px solid var(--border);padding:0">
      <div style="padding:12px 20px;background:var(--bg);display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)">
          📦 Produtos Fornecidos
        </div>
        <div style="display:flex;gap:12px;align-items:center">
          <span id="forn-kpi-produtos" style="font-size:11px;color:var(--muted)"></span>
          <span id="forn-kpi-total"    style="font-size:12px;font-weight:700;color:var(--red);font-family:'DM Mono',monospace"></span>
        </div>
      </div>
      <div style="max-height:320px;overflow-y:auto;overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead>
            <tr style="background:var(--bg)">
              <th style="padding:7px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)">Produto</th>
              <th style="padding:7px 8px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)">ABC</th>
              <th style="padding:7px 8px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)">Último Preço</th>
              <th style="padding:7px 8px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)">Última Compra</th>
              <th style="padding:7px 8px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)">Histórico 6m</th>
              <th style="padding:7px 8px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)"># Compras</th>
            </tr>
          </thead>
          <tbody id="forn-prod-tbody">
            <tr><td colspan="6" style="padding:16px;text-align:center;color:var(--muted)">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="md-foot">
      <button class="btn btn-s" onclick="fechar()">Cancelar</button>
      <button class="btn btn-p" onclick="salvar()">💾 Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let _api = null;
let _fornecedores = [];
let _editandoCnpj = null;
let _categorias   = [];

window.onBBReady = async () => {
  const { api, fmt, toast } = BB;
  _api = api;
  const me = await api.get('/auth/me');
  if (me.ok) document.getElementById('ph-perfil').textContent = me.data.email || me.data.perfil;

  // Carrega categorias do DRE para vincular fornecedor
  const cats = await api.get('/api/config/categorias');
  if (cats.ok && cats.data?.length) {
    _categorias = cats.data;
    const sel = document.getElementById('f-categoria');
    _categorias.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.label_exibicao || c.subgrupo;
      opt.textContent = (c.grupo ? c.grupo + ' › ' : '') + (c.label_exibicao || c.subgrupo);
      sel.appendChild(opt);
    });
  }

  await buscar();
};

// ── Listagem ─────────────────────────────────────────────────────────────────
let _buscaTimer;
function buscar() {
  clearTimeout(_buscaTimer);
  _buscaTimer = setTimeout(_buscarExec, 300);
}

async function _buscarExec() {
  const q       = document.getElementById('inp-busca').value.trim();
  const inativos = document.getElementById('chk-inativos').checked;
  const params  = new URLSearchParams();
  if (q) params.set('q', q);
  if (inativos) params.set('ativo', 'false');

  const d = await (_api||BB.api).get('/api/fornecedores?' + params.toString());
  // API retorna array direto (sem wrapper ok/data)
  _fornecedores = Array.isArray(d) ? d : (d.data || []);
  renderLista();
}

function renderLista() {
  const wrap = document.getElementById('lista-wrap');
  const label = document.getElementById('count-label');
  label.textContent = `${_fornecedores.length} fornecedor(es)`;

  if (!_fornecedores.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-ico">🏭</div>
      <div>Nenhum fornecedor encontrado</div>
      <div style="font-size:12px;margin-top:6px;color:var(--muted)">Use o botão "+ Novo Fornecedor" para cadastrar</div>
    </div>`;
    return;
  }

  // Detectar CNPJs duplicados para alertar o usuário a rodar a limpeza
  const cnpjCount = {};
  _fornecedores.forEach(f => {
    const c = (f.cnpj_fornecedor||'').replace(/\D/g,'');
    if (c) cnpjCount[c] = (cnpjCount[c]||0) + 1;
  });
  const qtdDuplicados = Object.values(cnpjCount).filter(n => n > 1).length;
  const avisoDedup = qtdDuplicados > 0 ? `
    <div style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-size:13px;color:#856404">⚠️ <strong>${qtdDuplicados} CNPJ(s)</strong> aparecem duplicados na lista abaixo.</span>
      <button onclick="dedupFornecedores()" style="margin-left:auto;padding:5px 14px;background:#ffc107;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;color:#856404">🧹 Limpar agora</button>
    </div>` : '';

  wrap.innerHTML = avisoDedup + `
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Fornecedor</th>
          <th>CNPJ</th>
          <th>Contato</th>
          <th>Categoria DRE</th>
          <th>Status</th>
          <th></th>
        </tr></thead>
        <tbody>
          ${_fornecedores.map(f => `
            <tr onclick="abrirEditar('${f.cnpj_fornecedor}')">
              <td>
                <div class="td-nome">${f.nome_fantasia || f.razao_social}</div>
                ${f.nome_fantasia ? `<div class="td-fantasia">${f.razao_social}</div>` : ''}
              </td>
              <td class="td-cnpj">${formatCNPJ(f.cnpj_fornecedor)}</td>
              <td style="font-size:12px">
                ${f.contato ? `<div>${f.contato}</div>` : ''}
                ${f.telefone ? `<div style="color:var(--muted)">${f.telefone}</div>` : ''}
              </td>
              <td style="font-size:12px;color:var(--muted)">${f.categoria_padrao || '—'}</td>
              <td><span class="${f.ativo ? 'badge-ativo' : 'badge-inativo'}">${f.ativo ? 'Ativo' : 'Inativo'}</span></td>
              <td class="td-acoes" onclick="event.stopPropagation()">
                <button onclick="abrirEditar('${f.cnpj_fornecedor}')">✏️ Editar</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function abrirNovo() {
  _editandoCnpj = null;
  document.getElementById('m-titulo').textContent = 'Novo Fornecedor';
  document.getElementById('fg-ativo').style.display = 'none';
  limparForm();
  const panel = document.getElementById('forn-prod-panel');
  if(panel) panel.style.display = 'none';
  document.getElementById('f-cnpj').disabled = false;
  document.getElementById('m-forn').classList.add('open');
  setTimeout(() => document.getElementById('f-cnpj').focus(), 100);
}

function abrirEditar(cnpj) {
  const f = _fornecedores.find(x => x.cnpj_fornecedor === cnpj);
  if (!f) return;
  _editandoCnpj = cnpj;
  document.getElementById('m-titulo').textContent = 'Editar Fornecedor';
  document.getElementById('fg-ativo').style.display = '';
  document.getElementById('f-cnpj').value    = formatCNPJ(f.cnpj_fornecedor);
  document.getElementById('f-cnpj').disabled = true; // CNPJ não muda
  document.getElementById('f-razao').value     = f.razao_social || '';
  document.getElementById('f-fantasia').value  = f.nome_fantasia || '';
  document.getElementById('f-contato').value   = f.contato || '';
  document.getElementById('f-telefone').value  = f.telefone || '';
  document.getElementById('f-email').value     = f.email || '';
  document.getElementById('f-endereco').value  = f.endereco || '';
  document.getElementById('f-obs').value       = f.observacao || '';
  document.getElementById('f-ativo').checked   = f.ativo !== false;
  document.getElementById('f-categoria').value = f.categoria_padrao || '';
  document.getElementById('m-forn').classList.add('open');
  // Carregar painel de produtos
  carregarProdutosFornecedor(cnpj.replace(/\D/g,''));
}

function fechar() {
  document.getElementById('m-forn').classList.remove('open');
  limparForm();
}

function limparForm() {
  ['f-cnpj','f-razao','f-fantasia','f-contato','f-telefone','f-email','f-endereco','f-obs'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-categoria').value = '';
  document.getElementById('f-ativo').checked   = true;
}

async function salvar() {
  const cnpjRaw = document.getElementById('f-cnpj').value.replace(/\D/g,'');
  const razao   = document.getElementById('f-razao').value.trim();

  if (!_editandoCnpj && cnpjRaw.length !== 14) { toast('❌ CNPJ deve ter 14 dígitos'); return; }
  if (!razao) { toast('❌ Razão social é obrigatória'); return; }

  const body = {
    cnpj_fornecedor:  cnpjRaw,
    razao_social:     razao,
    nome_fantasia:    document.getElementById('f-fantasia').value.trim() || null,
    contato:          document.getElementById('f-contato').value.trim()  || null,
    telefone:         document.getElementById('f-telefone').value.trim() || null,
    email:            document.getElementById('f-email').value.trim()    || null,
    endereco:         document.getElementById('f-endereco').value.trim() || null,
    observacao:       document.getElementById('f-obs').value.trim()      || null,
    categoria_padrao: document.getElementById('f-categoria').value       || null,
    ativo:            document.getElementById('f-ativo').checked,
  };

  const btn = document.querySelector('.md-foot .btn-p');
  btn.disabled = true; btn.textContent = '⏳ Salvando...';

  let d;
  if (_editandoCnpj) {
    d = await (_api||BB.api).put(`/api/fornecedores/${_editandoCnpj}`, body);
    // PUT retorna {ok:true} — qualquer resposta sem erro é sucesso
    if (d.erro) { toast('❌ ' + d.erro); btn.disabled=false; btn.textContent='💾 Salvar'; return; }
    toast('✅ Fornecedor atualizado!');
  } else {
    d = await (_api||BB.api).post('/api/fornecedores', body);
    if (d.erro) { toast('❌ ' + d.erro); btn.disabled=false; btn.textContent='💾 Salvar'; return; }
    toast('✅ Fornecedor cadastrado!');
  }

  btn.disabled=false; btn.textContent='💾 Salvar';
  fechar();
  await _buscarExec();
}

// ── Utilitários ───────────────────────────────────────────────────────────────
function mascaraCNPJ(el) {
  let v = el.value.replace(/\D/g,'').slice(0,14);
  if (v.length > 12) v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
  else if (v.length > 8) v = v.replace(/(\d{2})(\d{3})(\d{3})(\d*)/,'$1.$2.$3/$4');
  else if (v.length > 5) v = v.replace(/(\d{2})(\d{3})(\d*)/,'$1.$2.$3');
  else if (v.length > 2) v = v.replace(/(\d{2})(\d*)/,'$1.$2');
  el.value = v;
}

function formatCNPJ(cnpj) {
  if (!cnpj) return '—';
  const c = String(cnpj).replace(/\D/g,'');
  if (c.length !== 14) return cnpj;
  return c.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
}

let _toastLocal;
async function carregarProdutosFornecedor(cnpj) {
  const panel  = document.getElementById('forn-prod-panel');
  const tbody  = document.getElementById('forn-prod-tbody');
  const kpiProd= document.getElementById('forn-kpi-produtos');
  const kpiTot = document.getElementById('forn-kpi-total');
  if (!panel || !tbody) return;

  panel.style.display = '';
  tbody.innerHTML = '<tr><td colspan="6" style="padding:16px;text-align:center;color:var(--muted)">⏳ Carregando produtos…</td></tr>';

  try {
    const apiFn = _api || window.BB?.api;
    const [resProd, resRes] = await Promise.all([
      apiFn.get('/api/fornecedores/' + cnpj + '/produtos'),
      apiFn.get('/api/fornecedores/' + cnpj + '/resumo-compras'),
    ]);

    // KPIs
    if (resRes.ok && resRes.data) {
      const r = resRes.data;
      kpiProd.textContent = `${r.total_produtos || 0} produto(s) · ${r.total_nfes || 0} NF(s)`;
      const tot = parseFloat(r.total_comprado || 0);
      kpiTot.textContent = tot > 0 ? 'R$ ' + tot.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '';
    }

    if (!resProd.ok || !resProd.data?.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="padding:20px;text-align:center;color:var(--muted)">Nenhum produto encontrado. Importe planilhas de compras para popular automaticamente.</td></tr>';
      return;
    }

    const brl = v => v != null ? 'R$ ' + parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
    const fmtDt = d => d ? d.split('-').reverse().join('/') : '—';
    const abcBadge = v => v ? `<span style="background:${{A:'#dcfce7',B:'#dbeafe',C:'#f3f4f6'}[v]||'#f3f4f6'};color:${{A:'#16a34a',B:'#2563eb',C:'#6b7280'}[v]||'#6b7280'};padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700">${v}</span>` : '—';

    tbody.innerHTML = resProd.data.map(p => {
      // Histórico de preços mini-gráfico (últimos valores)
      let hist = '';
      if (p.historico_precos?.length) {
        const vals = p.historico_precos.slice(0, 4).map(h =>
          `<span title="${fmtDt(h.data_entrada)}" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">${parseFloat(h.valor_unitario).toFixed(2).replace('.',',')}</span>`
        ).join(' · ');
        hist = `<div style="font-size:10px;line-height:1.4">${vals}</div>`;
      }

      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:8px 12px">
          <div style="font-size:12px;font-weight:600">${p.produto_nome || p.produto_codigo}</div>
          <div style="font-size:10px;color:var(--muted)">${p.produto_codigo}${p.categoria ? ' · ' + p.categoria : ''}</div>
        </td>
        <td style="padding:8px;text-align:right">${abcBadge(p.curva_abc)}</td>
        <td style="padding:8px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:700">
          ${brl(p.ultimo_preco)}
        </td>
        <td style="padding:8px;text-align:right;font-size:11px;color:var(--muted)">
          ${fmtDt(p.ultima_compra)}
        </td>
        <td style="padding:8px;text-align:right">${hist || '—'}</td>
        <td style="padding:8px;text-align:right;font-size:12px;color:var(--muted)">${p.compras_count || 1}x</td>
      </tr>`;
    }).join('');

  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6" style="padding:16px;text-align:center;color:#dc2626">❌ ${e.message}</td></tr>`;
  }
}

function toast(msg) {
  if (typeof BB !== 'undefined' && BB.toast) { BB.toast(msg); return; }
  // fallback local
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastLocal);
  _toastLocal = setTimeout(() => el.classList.remove('show'), 2800);
}


// ═══════════════════════════════════════════════════════════════
// CATÁLOGO DE PRODUTOS POR FORNECEDOR
// ═══════════════════════════════════════════════════════════════
let _catalogoRaw = [];

function mudarAba(aba, btn) {
  // Atualizar botões
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  // Mostrar/ocultar seções
  const secForn = document.getElementById('sec-fornecedores');
  const secCat  = document.getElementById('sec-catalogo');
  const toolbar = document.querySelector('.toolbar');

  if (aba === 'catalogo') {
    if (secForn) secForn.style.display = 'none';
    if (secCat)  secCat.style.display  = '';
    if (toolbar) toolbar.style.display = 'none';
    // Carregar automaticamente se ainda não carregou
    if (!_catalogoRaw.length) carregarCatalogo();
  } else {
    if (secForn) secForn.style.display = '';
    if (secCat)  secCat.style.display  = 'none';
    if (toolbar) toolbar.style.display = '';
  }
}

async function carregarCatalogo() {
  const wrap = document.getElementById('cat-wrap');
  if (!wrap) return;
  wrap.innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted)">⏳ Carregando catálogo…</div>';

  try {
    const apiFn = _api || window.BB?.api;
    const res = await apiFn.get('/api/fornecedores/catalogo');
    if (!res.ok) throw new Error(res.erro || 'Erro ao carregar catálogo');
    _catalogoRaw = res.data || [];

    const totalForn = _catalogoRaw.length;
    const totalProd = _catalogoRaw.reduce((s, f) => s + (f.produtos?.length || 0), 0);
    const el = document.getElementById('cat-resumo');
    if (el) el.textContent = totalForn + ' fornecedor(es) · ' + totalProd + ' produto(s)';

    renderCatalogo(_catalogoRaw);
  } catch(e) {
    wrap.innerHTML = `<div style="text-align:center;padding:32px;color:#dc2626">❌ ${e.message}</div>`;
  }
}

function filtrarCatalogo() {
  const bForn = (document.getElementById('cat-busca')?.value || '').toLowerCase().trim();
  const bProd = (document.getElementById('cat-busca-prod')?.value || '').toLowerCase().trim();

  const filtrado = _catalogoRaw
    .map(f => {
      // Filtrar fornecedor por nome
      const nomeOk = !bForn ||
        (f.nome_display || '').toLowerCase().includes(bForn) ||
        (f.razao_social || '').toLowerCase().includes(bForn);
      if (!nomeOk) return null;

      // Filtrar produtos por nome/código
      const prods = bProd
        ? (f.produtos || []).filter(p =>
            (p.produto_nome || '').toLowerCase().includes(bProd) ||
            (p.produto_codigo || '').toLowerCase().includes(bProd))
        : (f.produtos || []);

      if (!prods.length && bProd) return null;
      return { ...f, produtos: prods };
    })
    .filter(Boolean);

  const el = document.getElementById('cat-resumo');
  if (el) {
    const totalP = filtrado.reduce((s, f) => s + (f.produtos?.length || 0), 0);
    el.textContent = filtrado.length + ' fornecedor(es) · ' + totalP + ' produto(s)';
  }

  renderCatalogo(filtrado);
}

function renderCatalogo(data) {
  const wrap = document.getElementById('cat-wrap');
  if (!wrap) return;

  if (!data.length) {
    wrap.innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted)">Nenhum resultado encontrado</div>';
    return;
  }

  const brl = v => v != null
    ? 'R$ ' + parseFloat(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})
    : '—';
  const fmtDt = d => d ? d.split('-').reverse().join('/') : '—';
  const abcBadge = v => v
    ? `<span style="background:${{A:'#dcfce7',B:'#dbeafe',C:'#f3f4f6'}[v]||'#f3f4f6'};color:${{A:'#16a34a',B:'#2563eb',C:'#6b7280'}[v]||'#6b7280'};padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700">${v}</span>`
    : '';

  wrap.innerHTML = data.map((f, idx) => {
    const nProds   = f.produtos?.length || 0;
    const ultiComp = f.ultima_compra ? fmtDt(f.ultima_compra) : '—';

    const linhasProd = (f.produtos || []).map(p => `
      <tr style="border-bottom:1px solid var(--border)">
        <td style="padding:8px 16px">
          <span style="font-size:12px;font-weight:600">${p.produto_nome || p.produto_codigo}</span>
          <span style="font-size:10px;color:var(--muted);margin-left:6px">${p.produto_codigo}</span>
          ${p.categoria ? `<span style="font-size:10px;color:var(--muted)"> · ${p.categoria}</span>` : ''}
        </td>
        <td style="padding:8px;text-align:center">${abcBadge(p.curva_abc)}</td>
        <td style="padding:8px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:700">
          ${brl(p.ultimo_preco)}
        </td>
        <td style="padding:8px;text-align:right;font-size:11px;color:var(--muted)">
          ${fmtDt(p.ultima_compra)}
        </td>
        <td style="padding:8px;text-align:right;font-size:11px;color:var(--muted)">
          ${p.estoque != null ? parseFloat(p.estoque).toLocaleString('pt-BR',{maximumFractionDigits:3}) + ' ' + (p.unidade||'') : '—'}
        </td>
        <td style="padding:8px;text-align:right;font-size:11px;color:var(--muted)">${p.compras_count || 1}x</td>
      </tr>`).join('');

    return `
      <div class="cat-forn-card">
        <div class="cat-forn-head" onclick="toggleCatForn(${idx})">
          <div>
            <div class="cat-forn-nome">${f.nome_display || f.razao_social}</div>
            ${f.nome_display !== f.razao_social
              ? `<div style="font-size:10px;color:var(--muted)">${f.razao_social}</div>` : ''}
          </div>
          <div class="cat-forn-meta">
            ${nProds} produto(s) · última compra: ${ultiComp}
          </div>
          <span style="font-size:14px;color:var(--muted);margin-left:8px" id="cat-arrow-${idx}">▶</span>
        </div>
        <div class="cat-forn-body" id="cat-body-${idx}">
          <table style="width:100%;border-collapse:collapse">
            <thead>
              <tr style="background:var(--bg)">
                <th style="padding:7px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Produto</th>
                <th style="padding:7px 8px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">ABC</th>
                <th style="padding:7px 8px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Último Preço</th>
                <th style="padding:7px 8px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Última Compra</th>
                <th style="padding:7px 8px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Estoque</th>
                <th style="padding:7px 8px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)"># Compras</th>
              </tr>
            </thead>
            <tbody>${linhasProd}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');
}

function toggleCatForn(idx) {
  const body  = document.getElementById('cat-body-' + idx);
  const arrow = document.getElementById('cat-arrow-' + idx);
  if (!body) return;
  const open = body.classList.toggle('open');
  if (arrow) arrow.textContent = open ? '▼' : '▶';
}

// Expandir todos / colapsar todos
function expandirTodosForn() {
  document.querySelectorAll('.cat-forn-body').forEach((b, i) => {
    b.classList.add('open');
    const arr = document.getElementById('cat-arrow-' + i);
    if (arr) arr.textContent = '▼';
  });
}
function colapsarTodosForn() {
  document.querySelectorAll('.cat-forn-body').forEach((b, i) => {
    b.classList.remove('open');
    const arr = document.getElementById('cat-arrow-' + i);
    if (arr) arr.textContent = '▶';
  });
}


async function dedupFornecedores() {
  if (!confirm('Remover fornecedores duplicados (mesmo CNPJ)?\n\nO sistema manterá o registro mais completo de cada CNPJ.')) return;
  const btn = event.target;
  btn.disabled = true; btn.textContent = '⏳ Removendo...';
  try {
    const d = await api.post('/api/fornecedores/dedup', {});
    if (d.ok) { alert(`✅ ${d.msg}`); location.reload(); }
    else alert('❌ ' + (d.erro || 'Erro ao remover duplicatas'));
  } catch(e) { alert('❌ Erro: ' + e.message); }
  btn.disabled = false; btn.textContent = '🧹 Remover duplicatas';
}

async function sincronizarHistorico() {
  const btn = document.getElementById('btn-sinc-hist');
  if(btn){ btn.disabled = true; btn.textContent = '⏳ Sincronizando…'; }
  try {
    const apiFn = _api || window.BB?.api;
    const res = await apiFn.post ? 
      apiFn.post('/api/fornecedores/sincronizar', {}) :
      await fetch('/api/fornecedores/sincronizar', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+sessionStorage.getItem('bb_token')},
        body:'{}'
      }).then(r=>r.json());
    if(res.ok) {
      toast('✅ ' + res.msg);
      await carregarCatalogo();
    } else {
      toast('❌ ' + (res.erro || 'Erro ao sincronizar'));
    }
  } catch(e) {
    toast('❌ ' + e.message);
  } finally {
    if(btn){ btn.disabled = false; btn.textContent = '⚡ Sincronizar histórico'; }
  }
}
