<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ponto Eletrônico — Bom Beef</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="js/api.js"></script>
<style>
:root{--red:#8B0000;--red-l:#C0392B;--green:#1a7a4a;--orange:#c76b00;--blue:#1a5c8a;
  --bg:#f7f4f0;--white:#fff;--text:#1a1a1a;--muted:#7a7068;--border:#e8e0d8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.ph{background:linear-gradient(135deg,var(--red),var(--red-l));padding:12px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(139,0,0,.3);flex-shrink:0;}
.ph h2{font-family:'Playfair Display',serif;font-size:16px;color:#fff;font-weight:700;}
.body{flex:1;padding:16px;max-width:560px;margin:0 auto;width:100%;}

/* Relógio */
.relogio{text-align:center;margin:20px 0 24px;padding:20px;background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.06);}
.relogio-hora{font-size:52px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);line-height:1;}
.relogio-data{font-size:14px;color:var(--muted);margin-top:6px;font-weight:600;}

/* Funcionário selecionado */
.func-box{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.func-avatar{width:44px;height:44px;background:linear-gradient(135deg,var(--red),var(--red-l));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;flex-shrink:0;}
.func-nome{font-weight:700;font-size:15px;}
.func-cargo{font-size:11px;color:var(--muted);margin-top:1px;}
.func-jornada{font-size:11px;color:var(--blue);margin-top:2px;}

/* Status do dia */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.status-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.status-item .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:4px;}
.status-item .val{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;}
.status-item.ok .val{color:var(--green);}
.status-item.pend .val{color:var(--orange);}
.status-item.vazio .val{color:#ccc;}

/* Botões de ponto */
.ponto-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.ponto-btn{padding:18px 12px;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .1s,box-shadow .1s;border:2px solid transparent;}
.ponto-btn:active{transform:scale(.97);}
.ponto-btn .icon{font-size:28px;}
.ponto-btn.entrada{background:#dcfce7;color:#166534;border-color:#86efac;}
.ponto-btn.intervalo{background:#fef3c7;color:#92400e;border-color:#fcd34d;}
.ponto-btn.retorno{background:#dbeafe;color:#1e40af;border-color:#93c5fd;}
.ponto-btn.saida{background:#fee2e2;color:#991b1b;border-color:#fca5a5;}
.ponto-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.ponto-btn.feito{opacity:.6;position:relative;}
.ponto-btn.feito::after{content:'✓';position:absolute;top:8px;right:10px;font-size:14px;}

/* Resumo horas */
.horas-box{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.horas-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f5efe8;font-size:13px;}
.horas-row:last-child{border-bottom:none;}
.horas-row .k{color:var(--muted);}
.horas-row .v{font-weight:700;font-family:'DM Mono',monospace;}
.badge-atraso{background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.badge-extra{background:#dcfce7;color:#166534;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.badge-ok{background:#f0fdf4;color:#166534;padding:2px 8px;border-radius:6px;font-size:11px;}

/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;align-items:center;justify-content:center;padding:16px;}
.mbg.open{display:flex;}
.md{background:var(--white);border-radius:14px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.mdh{background:linear-gradient(135deg,var(--red),var(--red-l));padding:14px 18px;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:center;}
.mdh h3{color:#fff;font-size:15px;font-weight:700;}
.mdx{background:none;border:none;color:rgba(255,255,255,.8);font-size:22px;cursor:pointer;}
.mdb{padding:16px 18px;}
.mdf{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;}
.btn-red{background:var(--red);color:#fff;}
.btn-gray{background:var(--white);color:var(--text);border:1px solid var(--border);}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;}

/* Seletor de funcionário */
.func-select-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
.func-select-wrap h3{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--muted);}
.func-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.func-card{padding:12px;border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;transition:.15s;}
.func-card:hover{border-color:var(--red);background:#fdf5f5;}
.func-card.sel{border-color:var(--red);background:#fff5f5;}
.func-card .fn{font-size:12px;font-weight:700;margin-top:6px;}
.func-card .fc{font-size:10px;color:var(--muted);}
</style>
</head>
<body>
<div class="ph">
  <span style="font-size:20px">⏱️</span>
  <h2>Ponto Eletrônico</h2>
  <div style="margin-left:auto;font-size:11px;color:rgba(255,255,255,.75)" id="ph-data"></div>
</div>

<div class="body">
  <!-- Relógio -->
  <div class="relogio">
    <div class="relogio-hora" id="relogio">00:00:00</div>
    <div class="relogio-data" id="relogio-data"></div>
  </div>

  <!-- Seletor de funcionário -->
  <div class="func-select-wrap" id="func-select-wrap">
    <h3>👤 Selecione seu nome</h3>
    <div class="func-grid" id="func-grid"></div>
  </div>

  <!-- Info do funcionário selecionado -->
  <div class="func-box" id="func-box" style="display:none">
    <div class="func-avatar" id="func-av">?</div>
    <div>
      <div class="func-nome" id="func-nome">—</div>
      <div class="func-cargo" id="func-cargo"></div>
      <div class="func-jornada" id="func-jornada"></div>
    </div>
    <button onclick="trocarFuncionario()" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:7px;padding:5px 10px;cursor:pointer;font-size:11px;color:var(--muted)">Trocar</button>
  </div>

  <!-- Status do dia -->
  <div id="status-grid-wrap" style="display:none">
    <div class="status-grid">
      <div class="status-item" id="si-entrada">
        <div class="lbl">Entrada</div><div class="val vazio">—</div>
      </div>
      <div class="status-item" id="si-intervalo">
        <div class="lbl">Saída Intervalo</div><div class="val vazio">—</div>
      </div>
      <div class="status-item" id="si-retorno">
        <div class="lbl">Retorno</div><div class="val vazio">—</div>
      </div>
      <div class="status-item" id="si-saida">
        <div class="lbl">Saída</div><div class="val vazio">—</div>
      </div>
    </div>

    <!-- Botões de ponto -->
    <div class="ponto-btns">
      <button class="ponto-btn entrada" id="btn-entrada" onclick="baterPonto('entrada')" disabled>
        <span class="icon">🟢</span>Registrar Entrada
      </button>
      <button class="ponto-btn intervalo" id="btn-intervalo" onclick="baterPonto('saida_intervalo')" disabled>
        <span class="icon">🟡</span>Saída Intervalo
      </button>
      <button class="ponto-btn retorno" id="btn-retorno" onclick="baterPonto('retorno_intervalo')" disabled>
        <span class="icon">🔵</span>Retorno Intervalo
      </button>
      <button class="ponto-btn saida" id="btn-saida" onclick="baterPonto('saida')" disabled>
        <span class="icon">🔴</span>Registrar Saída
      </button>
    </div>

    <!-- Resumo horas do dia -->
    <div class="horas-box" id="horas-box" style="display:none">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px">Resumo do Dia</div>
      <div class="horas-row"><span class="k">Horas trabalhadas</span><span class="v" id="hr-trab">—</span></div>
      <div class="horas-row"><span class="k">Jornada prevista</span><span class="v" id="hr-prev">—</span></div>
      <div class="horas-row"><span class="k">Situação</span><span class="v" id="hr-status">—</span></div>
    </div>
  </div>
</div>

<!-- Modal confirmação -->
<div class="mbg" id="m-confirmar">
  <div class="md">
    <div class="mdh"><h3 id="conf-titulo">Confirmar</h3><button class="mdx" onclick="fecharModal()">×</button></div>
    <div class="mdb">
      <div style="text-align:center;padding:8px 0">
        <div style="font-size:40px" id="conf-icon">⏱️</div>
        <div style="font-size:22px;font-weight:700;margin:10px 0" id="conf-hora"></div>
        <div style="font-size:13px;color:var(--muted)" id="conf-desc"></div>
      </div>
    </div>
    <div class="mdf">
      <button class="btn btn-gray" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-red" id="conf-btn" onclick="confirmarPonto()">✅ Confirmar</button>
    </div>
  </div>
</div>

<script>
const {api, fmt, toast} = BB;
let _funcAtual = null, _pontoHoje = null, _tipoConfirmar = null;
let _funcionarios = [];

// ── Relógio ──────────────────────────────────────────────────────────────────
function tickRelogio() {
  const agora = new Date();
  document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR');
  const ds = agora.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('relogio-data').textContent = ds.charAt(0).toUpperCase()+ds.slice(1);
  document.getElementById('ph-data').textContent = agora.toLocaleDateString('pt-BR');
}
setInterval(tickRelogio, 1000);
tickRelogio();

// ── Init ─────────────────────────────────────────────────────────────────────
window.onBBReady = async () => {
  await carregarFuncionarios();
  // Se o próprio funcionário está logado, seleciona automaticamente
  if (BB.api && window.parent !== window) {
    // Tenta obter o ID do funcionário do usuário logado via portal
  }
};

async function carregarFuncionarios() {
  const d = await api.get('/api/rh/funcionarios');
  if (!d.ok) return;
  _funcionarios = (d.data || []).filter(f => f.ativo);
  const grid = document.getElementById('func-grid');
  grid.innerHTML = _funcionarios.map(f => `
    <div class="func-card" onclick="selecionarFuncionario(${f.id})" id="fc-${f.id}">
      <div style="font-size:24px">${f.nome.charAt(0).toUpperCase()}</div>
      <div class="fn">${f.nome.split(' ')[0]}</div>
      <div class="fc">${f.cargo||'—'}</div>
    </div>`).join('');
}

async function selecionarFuncionario(id) {
  _funcAtual = _funcionarios.find(f => f.id === id);
  if (!_funcAtual) return;
  // UI
  document.getElementById('func-select-wrap').style.display = 'none';
  document.getElementById('func-box').style.display = 'flex';
  document.getElementById('status-grid-wrap').style.display = '';
  document.getElementById('func-av').textContent = _funcAtual.nome.charAt(0).toUpperCase();
  document.getElementById('func-nome').textContent = _funcAtual.nome;
  document.getElementById('func-cargo').textContent = _funcAtual.cargo || '';
  const ent = _funcAtual.horario_entrada?.slice(0,5) || '08:00';
  const sai = _funcAtual.horario_saida?.slice(0,5)  || '18:00';
  const jor = _funcAtual.jornada_horas || 8;
  document.getElementById('func-jornada').textContent = `Jornada: ${ent} → ${sai} (${jor}h) · Tolerância: ${_funcAtual.tolerancia_min||10}min`;
  await carregarPontoHoje();
}

function trocarFuncionario() {
  _funcAtual = null; _pontoHoje = null;
  document.getElementById('func-select-wrap').style.display = '';
  document.getElementById('func-box').style.display = 'none';
  document.getElementById('status-grid-wrap').style.display = 'none';
}

async function carregarPontoHoje() {
  if (!_funcAtual) return;
  const d = await api.get(`/api/ponto/hoje/${_funcAtual.id}`);
  _pontoHoje = d.data;
  renderStatusHoje();
}

function fmtHora(ts) {
  if (!ts) return null;
  return new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function renderStatusHoje() {
  const p = _pontoHoje;
  const setItem = (id, val, cls) => {
    const el = document.getElementById(id);
    el.querySelector('.val').textContent = val || '—';
    el.className = 'status-item ' + (val ? cls : 'vazio');
  };
  setItem('si-entrada',   fmtHora(p?.entrada),             'ok');
  setItem('si-intervalo', fmtHora(p?.saida_intervalo),     'pend');
  setItem('si-retorno',   fmtHora(p?.retorno_intervalo),   'ok');
  setItem('si-saida',     fmtHora(p?.saida),               'ok');

  // Habilitar/desabilitar botões conforme sequência lógica
  const e = !!p?.entrada, si = !!p?.saida_intervalo, ri = !!p?.retorno_intervalo, s = !!p?.saida;
  const setBt = (id, enabled, feito) => {
    const bt = document.getElementById(id);
    bt.disabled = !enabled;
    bt.classList.toggle('feito', feito);
  };
  setBt('btn-entrada',   !e,          e);
  setBt('btn-intervalo', e && !si,    si);
  setBt('btn-retorno',   si && !ri,   ri);
  setBt('btn-saida',     (e && !s) || (ri && !s), s);

  // Resumo de horas
  if (p?.entrada && p?.saida) {
    const ms = new Date(p.saida) - new Date(p.entrada);
    const intMs = (p.saida_intervalo && p.retorno_intervalo)
      ? new Date(p.retorno_intervalo) - new Date(p.saida_intervalo)
      : (_funcAtual.intervalo_min||60) * 60000;
    const trabMin = Math.max(0, (ms - intMs) / 60000);
    const trabH   = trabMin / 60;
    const prevH   = parseFloat(_funcAtual.jornada_horas || 8);
    const extraMin= (trabH - prevH) * 60;
    const atrasoTs= new Date(p.entrada);
    const prevEntTs = new Date(`1970-01-01T${_funcAtual.horario_entrada||'08:00'}:00`);
    const atrasoMin = (atrasoTs.getHours()*60+atrasoTs.getMinutes()) - (prevEntTs.getHours()*60+prevEntTs.getMinutes());
    const hStr = h => `${Math.floor(h)}h${String(Math.round((h%1)*60)).padStart(2,'0')}min`;
    document.getElementById('hr-trab').textContent = hStr(trabH);
    document.getElementById('hr-prev').textContent = hStr(prevH);
    const stEl = document.getElementById('hr-status');
    if (atrasoMin > (_funcAtual.tolerancia_min||10)) {
      stEl.innerHTML = `<span class="badge-atraso">⚠️ Atraso de ${atrasoMin}min</span>`;
    } else if (extraMin > 30) {
      stEl.innerHTML = `<span class="badge-extra">✅ Hora extra: ${Math.round(extraMin)}min</span>`;
    } else {
      stEl.innerHTML = `<span class="badge-ok">✅ Normal</span>`;
    }
    document.getElementById('horas-box').style.display = '';
  } else {
    document.getElementById('horas-box').style.display = 'none';
  }
}

// ── Bater ponto ───────────────────────────────────────────────────────────────
const LABELS = {
  entrada:           { titulo:'Registrar Entrada',    icon:'🟢', desc:'Confirme o registro de entrada' },
  saida_intervalo:   { titulo:'Saída para Intervalo', icon:'🟡', desc:'Confirme a saída para intervalo' },
  retorno_intervalo: { titulo:'Retorno do Intervalo', icon:'🔵', desc:'Confirme o retorno do intervalo' },
  saida:             { titulo:'Registrar Saída',      icon:'🔴', desc:'Confirme o registro de saída' },
};

function baterPonto(tipo) {
  _tipoConfirmar = tipo;
  const info = LABELS[tipo];
  const agora = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('conf-titulo').textContent = info.titulo;
  document.getElementById('conf-icon').textContent   = info.icon;
  document.getElementById('conf-hora').textContent   = agora;
  document.getElementById('conf-desc').textContent   = info.desc;
  document.getElementById('m-confirmar').classList.add('open');
}

async function confirmarPonto() {
  if (!_funcAtual || !_tipoConfirmar) return;
  document.getElementById('conf-btn').disabled = true;
  const d = await api.post('/api/ponto/bater', {
    funcionario_id: _funcAtual.id, tipo: _tipoConfirmar
  });
  document.getElementById('conf-btn').disabled = false;
  fecharModal();
  if (!d.ok) { toast('❌ '+d.erro); return; }
  toast(`✅ ${LABELS[_tipoConfirmar].titulo} registrada às ${d.horario}!`);
  _tipoConfirmar = null;
  await carregarPontoHoje();
}

function fecharModal() { document.getElementById('m-confirmar').classList.remove('open'); }
</script>
</body>
</html>
