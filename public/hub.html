<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hub Operacional — Bom Beef</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/bb-theme.css">
<script src="/js/api.js"></script>
<style>
:root{
  --red:#8B0000;--red-l:#C0392B;--bg:#f7f4f0;--white:#fff;
  --text:#1a1a1a;--muted:#7a7068;--border:#e8e0d8;
  --green:#15803d;--green-bg:#f0fdf4;--green-bdr:#bbf7d0;
  --amber:#92400e;--amber-bg:#fffbeb;--amber-bdr:#fcd34d;
  --blue:#1e3a8a;--blue-bg:#eff6ff;--blue-bdr:#bfdbfe;
  --shadow:0 2px 8px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

.ph{background:var(--red);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(139,0,0,.25);}
.ph-left{display:flex;align-items:center;gap:10px;}
.ph h2{font-family:'Playfair Display',serif;font-size:16px;color:#fff;}
.ph-hora{font-size:11px;color:rgba(255,255,255,.65);}
.btn-att{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:600;}
.btn-att:hover{background:rgba(255,255,255,.25);}

.content{padding:14px 18px;flex:1;overflow-y:auto;overflow-x:auto;;background:var(--bg);}
.sec-title{font-size:9px;text-transform:uppercase;letter-spacing:1.4px;font-weight:700;color:var(--muted);margin-bottom:9px;padding-left:2px;}
.secao{margin-bottom:18px;}

/* ── SEMÁFORO ── */
.semaforo{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;}
.semaforo>*{min-width:0;}
.sem{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:10px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.sem:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.sem.ok{border-left:3px solid var(--green);}
.sem.alerta{border-left:3px solid #d97706;}
.sem.critico{border-left:3px solid var(--red-l);background:#fff8f8;}
.sem-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sem.ok .sem-dot{background:var(--green);}
.sem.alerta .sem-dot{background:#d97706;}
.sem.critico .sem-dot{background:var(--red-l);animation:pulso .8s infinite;}
@keyframes pulso{0%,100%{opacity:1}50%{opacity:.35}}
.sem-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700;}
.sem-msg{font-size:12px;color:var(--text);font-weight:600;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── CARD ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);min-width:0;min-height:120px;display:flex;flex-direction:column;}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:.9px;font-weight:700;color:var(--muted);margin-bottom:14px;}

/* ── VENDAS CARD ── */
.vendas-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.vdiv{display:none;}
.vbloco{min-width:0;overflow-wrap:anywhere;;word-break:break-word;;padding:4px 0;}
.v-label{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700;margin-bottom:6px;}
.v-val{font-family:'DM Mono',monospace;font-size:clamp(16px,2vw,24px);font-weight:700;color:var(--text);margin:3px 0 2px;overflow-wrap:anywhere;word-break:break-word;;max-width:100%;}
.v-val.sem-dado{color:var(--muted);font-size:16px;}
.v-sub{font-size:11px;color:var(--muted);;overflow-wrap:anywhere;;margin-top:4px;}
.v-comp{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;margin-top:4px;padding:2px 7px;border-radius:5px;}
.v-comp.pos{background:var(--green-bg);color:var(--green);}
.v-comp.neg{background:#fef2f2;color:var(--red-l);}
.v-comp.neu{background:var(--bg);color:var(--muted);}

/* ── META BAR ── */
.meta-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px;gap:4px;}
.meta-lbl{font-size:11px;color:var(--muted);}
.meta-pct{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;;flex-shrink:0;}
.meta-bar-bg{background:#f0ebe4;border-radius:4px;height:7px;overflow:hidden;margin-top:12px;margin-bottom:2px;}
.meta-bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}

/* ── IMPORTAÇÕES ── */
.imp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.imp-item{background:var(--bg);border-radius:8px;padding:9px 11px;border-left:3px solid var(--border);}
.imp-item.ok{border-left-color:var(--green);}
.imp-item.alerta{border-left-color:#d97706;}
.imp-item.critico{border-left-color:var(--red-l);}
.imp-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;}
.imp-msg{font-size:12px;font-weight:600;color:var(--text);margin-top:2px;}

/* ── KPI MINI ── */
.kpi-row{display:flex;gap:9px;flex-wrap:wrap;}
.kpi{flex:1;min-width:110px;background:var(--bg);border-radius:8px;padding:10px 12px;min-height:72px;display:flex;flex-direction:column;justify-content:center;}
.kpi-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;}
.kpi-v{font-family:'DM Mono',monospace;font-size:clamp(15px,1.6vw,20px);font-weight:700;margin-top:2px;line-height:1.2;overflow-wrap:anywhere;}
.kpi-v.pos{color:var(--green);}
.kpi-v.neg{color:var(--red-l);}
.kpi-v.warn{color:#d97706;}
.kpi-s{font-size:10px;color:var(--muted);margin-top:3px;}

/* ── ALERTAS ── */
.alert-list{display:flex;flex-direction:column;gap:5px;}
.ali{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12px;font-weight:500;}
.ali.critico{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
.ali.alerta{background:var(--amber-bg);border:1px solid var(--amber-bdr);color:var(--amber);}
.ali.ok{background:var(--green-bg);border:1px solid var(--green-bdr);color:var(--green);}
.ali-ico{font-size:13px;flex-shrink:0;}
.ali-txt{flex:1;}
.ali-btn{background:none;border:1px solid currentColor;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── ATALHOS ── */
.atalhos{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;}
.atalho{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:10px 11px;cursor:pointer;transition:all .15s;text-align:center;box-shadow:var(--shadow);}
.atalho:hover{border-color:var(--red);background:#fff8f8;transform:translateY(-1px);}
.at-ico{font-size:18px;margin-bottom:3px;}
.at-lbl{font-size:11px;font-weight:600;color:var(--text);}

/* ── DROP ── */
.drop{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--white);}
.drop:hover,.drop.drag{border-color:var(--red);background:#fff8f8;}
.drop-ico{font-size:24px;margin-bottom:4px;}
.drop-txt{font-size:13px;font-weight:600;}
.drop-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.tag{display:inline-block;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--muted);margin:3px 2px 0;}
.tag.nfe{background:#fff8f8;border-color:#fecaca;color:var(--red-l);}

/* ── COMPRAS ── */
.compras-grupo{margin-bottom:12px;}
.compras-header{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.compras-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;}
.badge-urgente{background:#fef2f2;color:var(--red-l);}
.badge-breve{background:var(--amber-bg);color:var(--amber);}
.badge-saudavel{background:var(--green-bg);color:var(--green);}
.comp-table{width:100%;border-collapse:collapse;font-size:12px;}
.comp-table th{font-size:9px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:var(--muted);padding:5px 8px;border-bottom:1px solid var(--border);text-align:left;}
.comp-table th.r,.comp-table td.r{text-align:right;}
.comp-table td{padding:6px 8px;border-bottom:1px solid #f5efe8;vertical-align:middle;}
.comp-table tr:hover td{background:#fdf9f7;}
.cob-pill{display:inline-block;padding:1px 7px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;}
.cob-urgente{background:#fef2f2;color:var(--red-l);}
.cob-breve{background:var(--amber-bg);color:var(--amber);}
.cob-saudavel{background:var(--green-bg);color:var(--green);}
.cob-sem{background:var(--bg);color:var(--muted);}
.fornec{font-size:10px;color:var(--muted);margin-top:1px;}

/* ── GRID ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;;align-items:stretch;}
.grid2>*{min-width:0;}
@media(max-width:900px){.grid2{grid-template-columns:1fr;}.vendas-grid{grid-template-columns:1fr;gap:12px;}.vdiv{display:none;}}
</style>
</head>
<body>

<div class="ph">
  <div class="ph-identity">
    <span class="ph-icon">🎛️</span>
    <div>
      <h1 class="ph-title">Hub Operacional</h1>
      <p class="ph-sub">Centro de comando diário do Bom Beef</p>
    </div>
  </div>
  <div class="ph-actions">
    <span class="ph-hora bb-hide-mobile" id="ph-hora" style="font-size:12px;opacity:.75;color:#fff">—</span>
    <button class="btn-att bb-btn bb-btn-secondary" onclick="carregar()">↻ Atualizar</button>
  </div>
</div>

<div class="content" id="content">
  <div style="padding:32px;text-align:center;color:var(--muted)">⏳ Carregando...</div>
</div>

<input type="file" id="file-input" accept=".xlsx,.xls,.csv,.ofx,.xml" style="display:none" onchange="onFileSelect(this.files[0])">

<script>
let _api = null;

window.onBBReady = () => {
  _api = BB.api;
  atualizarRelogio();
  setInterval(atualizarRelogio, 30000);
  carregar();
  carregarCampanhasHub().catch(function(){});
  setInterval(carregar, 300000); // refresh 5min
  setInterval(carregarCampanhasHub, 300000);
};

function atualizarRelogio() {
  const n = new Date();
  document.getElementById('ph-hora').textContent =
    n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

async function carregar() {
  try {
    const [res, comp, crit] = await Promise.all([
      (_api||BB.api).get('/api/hub/resumo'),
      (_api||BB.api).get('/api/hub/compras'),
      (_api||BB.api).get('/api/hub/resumo-criticos'),
    ]);
    if (!res.ok) { renderErro(res.erro); return; }
    render(res.data);
    renderCompras(comp.ok ? comp.data : null);
    renderCriticos(crit.ok ? crit.data : null);
  } catch(e) { renderErro(e.message); }
}

function renderErro(msg) {
  document.getElementById('content').innerHTML =
    `<div style="padding:32px;text-align:center;color:#991b1b">⚠️ ${msg||'Erro — tente atualizar'}</div>`;
}

function brl(v) {
  return 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function pctStr(v, casas=1) {
  if (v === null || v === undefined) return '—';
  return (v > 0 ? '+' : '') + parseFloat(v).toFixed(casas) + '%';
}
function compTag(v, label) {
  if (v === null || v === undefined) return '';
  const cls = v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu';
  const ico = v > 0 ? '▲' : v < 0 ? '▼' : '=';
  return `<span class="v-comp ${cls}">${ico} ${label}</span>`;
}

// ── Dias da semana ────────────────────────────────────────────────────────────
const DIAS = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];

function render(d) {
  const v  = d.vendas;
  const s  = d.status;
  const f  = d.financeiro;
  const im = d.importacoes;
  const o  = d.operacional;

  // ── Semáforo ──────────────────────────────────────────────────────────────
  const mods = [
    {key:'estoque',        label:'Estoque',     fn:()=>nav('produtos')},
    {key:'vendas',         label:'Vendas',      fn:()=>nav('faturamento')},
    {key:'validade',       label:'Validade',    fn:()=>nav('validade')},
    {key:'boletos',        label:'Boletos',     fn:()=>nav('boletos')},
    {key:'estoque_minimo', label:'Est. Mínimo', fn:()=>nav('produtos')},
  ];
  const semHtml = mods.map(m => {
    const st = s[m.key];
    const cls = st.critico?'critico':st.alerta?'alerta':'ok';
    return `<div class="sem ${cls}" onclick="(${m.fn.toString()})()">
      <div class="sem-dot"></div>
      <div style="flex:1;min-width:0">
        <div class="sem-lbl">${m.label}</div>
        <div class="sem-msg">${st.msg}</div>
      </div>
    </div>`;
  }).join('');

  // ── Seção Vendas ──────────────────────────────────────────────────────────
  const diaLabel = DIAS[v.dia_semana] || 'hoje';
  const fatHoje  = v.fat_hoje;
  const temHoje  = fatHoje > 0;
  const temMeta  = v.meta_dia > 0;
  const temSem   = v.fat_semana_ant > 0;

  const metaBarPct = temMeta && temHoje
    ? Math.min(Math.round(fatHoje / v.meta_dia * 100), 100) : 0;
  const metaBarMes = v.meta_mes > 0
    ? Math.min(Math.round(v.fat_mes / v.meta_mes * 100), 100) : 0;
  const barCorDia = metaBarPct >= 100 ? 'var(--green)' : metaBarPct >= 70 ? '#2563eb' : '#d97706';
  const barCorMes = metaBarMes >= 100 ? 'var(--green)' : metaBarMes >= 70 ? '#2563eb' : '#d97706';

  const vendaHtml = `
  <div class="card">
    <div class="card-title">💰 Vendas — ${d.mes}</div>
    <div class="vendas-grid">

      <!-- Coluna 1: Hoje -->
      <div class="vbloco">
        <div class="v-label">${diaLabel.charAt(0).toUpperCase()+diaLabel.slice(1)}</div>
        <div class="v-val ${!temHoje?'sem-dado':''}">${temHoje ? brl(fatHoje) : '—'}</div>
        ${!temHoje ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">Vendas de hoje ainda não importadas</div>` : ''}
        ${temHoje && v.pessoas_hoje > 0 ? `<div class="v-sub">${v.pessoas_hoje} atendimentos · ticket ${brl(v.ticket_hoje)}</div>` : ''}
        ${temHoje && temSem ? compTag(v.var_sem_pct, `${Math.abs(v.var_sem_pct).toFixed(1)}% vs ${DIAS[v.dia_semana]} passado`) : ''}
        ${temHoje && temSem ? `<div class="v-sub" style="margin-top:2px">${DIAS[v.dia_semana]} passado: ${brl(v.fat_semana_ant)}
          (${v.var_sem_r >= 0 ? '+' : ''}${brl(v.var_sem_r)})</div>` : ''}
        ${temMeta ? `
        <div class="meta-wrap">
          <div class="meta-row">
            <span class="meta-lbl">Meta do dia (÷26)</span>
            <span class="meta-pct" style="color:${barCorDia}">${temHoje ? metaBarPct+'%' : '—'}</span>
          </div>
          <div class="meta-row" style="margin-bottom:3px">
            <span style="font-size:11px;color:var(--muted)">${brl(temHoje?fatHoje:0)} / ${brl(v.meta_dia)}</span>
          </div>
          <div class="meta-bar-bg"><div class="meta-bar-fill" style="width:${metaBarPct}%;background:${barCorDia}"></div></div>
        </div>` : `<div style="margin-top:8px;font-size:11px;color:var(--muted)">
          <a href="#" onclick="nav('metas');return false" style="color:var(--red-l)">Definir meta do mês →</a></div>`}
      </div>

      <div class="vdiv"></div>

      <!-- Coluna 2: Mês acumulado -->
      <div class="vbloco">
        <div class="v-label">Mês acumulado${v.dias_importados > 0 ? ` (${v.dias_importados} dias importados)` : ''}</div>
        <div class="v-val ${v.fat_mes===0?'sem-dado':''}">${v.fat_mes > 0 ? brl(v.fat_mes) : '—'}</div>
        ${v.fat_mes === 0 ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">Importar relatório XMenu para ver dados de vendas</div>` : ''}
        ${v.pessoas_mes > 0 ? `<div class="v-sub">${v.pessoas_mes} atendimentos · ticket ${brl(v.ticket_mes)}</div>` : ''}
        ${v.fat_mes > 0 && v.fat_mes_ant > 0 && v.var_mes_pct != null ? compTag(v.var_mes_pct,
          `${Math.abs(v.var_mes_pct||0).toFixed(1)}% vs ${d.mes.replace(/(\d+)\/(\d+)/,'$1 mês ant.')}`) : ''}
        ${v.fat_liq_mes > 0 ? `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;padding:7px 10px;background:#f8fafc;border-radius:8px;border:1px solid var(--border)">
          <div style="font-size:11px">
            <span style="color:var(--muted)">Líquido PDV</span>
            <span style="font-family:'DM Mono',monospace;font-weight:700;margin-left:6px">${brl(v.fat_liq_mes)}</span>
          </div>
          <div style="font-size:11px;margin-left:auto">
            <span style="color:var(--muted)">Descontos</span>
            <span style="font-family:'DM Mono',monospace;font-weight:700;color:#dc2626;margin-left:6px">${brl(v.descontos_mes > 0 ? v.descontos_mes : Math.max(0, v.fat_mes - v.fat_liq_mes))}</span>
            ${v.fat_mes > 0 ? `<span style="font-size:10px;color:var(--muted);margin-left:3px">(${((v.descontos_mes > 0 ? v.descontos_mes : Math.max(0, v.fat_mes - v.fat_liq_mes))/v.fat_mes*100).toFixed(1)}%)</span>` : ''}
          </div>
        </div>` : ''}
        ${v.meta_mes > 0 ? `
        <div class="meta-wrap">
          <div class="meta-row">
            <span class="meta-lbl">Meta mensal</span>
            <span class="meta-pct" style="color:${barCorMes}">${v.pct_mes !== null ? v.pct_mes+'%' : '—'}</span>
          </div>
          <div class="meta-row" style="margin-bottom:3px">
            <span style="font-size:11px;color:var(--muted)">${brl(v.fat_mes)} / ${brl(v.meta_mes)}</span>
          </div>
          <div class="meta-bar-bg"><div class="meta-bar-fill" style="width:${metaBarMes}%;background:${barCorMes}"></div></div>
        </div>` : ''}
      </div>

      <div class="vdiv"></div>

      <!-- Coluna 3: Situação financeira rápida -->
      <div class="vbloco">
        <div class="v-label">Financeiro — ${d.mes}</div>
        <div class="kpi-row" style="flex-direction:column;gap:6px;margin-top:4px">
          <div style="display:flex;justify-content:space-between;font-size:12px">
            <span style="color:var(--muted)">Boletos abertos</span>
            <span class="kpi-v ${f.total_aberto>0?'warn':''}" style="font-size:13px">${brl(f.total_aberto)}</span>
          </div>
          ${f.boletos_vencidos > 0 ? `<div style="display:flex;justify-content:space-between;font-size:12px">
            <span style="color:var(--red-l)">⚠️ Vencidos</span>
            <span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--red-l)">${brl(f.boletos_vencidos_valor)} (${f.boletos_vencidos})</span>
          </div>` : ''}
          <div style="display:flex;justify-content:space-between;font-size:12px">
            <span style="color:var(--muted)">Perdas do mês</span>
            <span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700">${brl(f.perdas_mes)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:12px">
            <span style="color:var(--muted)">Retiradas</span>
            <span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700">${brl(f.retiradas_mes)}</span>
          </div>
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--muted)">
          Ver análise completa no <a href="#" onclick="nav('dashboard');return false" style="color:var(--red-l)">Dashboard →</a>
        </div>
      </div>
    </div>
  </div>`;

  // ── Pendências ────────────────────────────────────────────────────────────
  const pend = [];
  if (o.validade_vencidos > 0)
    pend.push({cls:'critico',ico:'🔴',txt:`${o.validade_vencidos} produto(s) VENCIDO(S) — retirar imediatamente`,btn:'Ver',fn:"nav('validade')"});
  if (o.validade_criticos > 0)
    pend.push({cls:'alerta',ico:'🟡',txt:`${o.validade_criticos} produto(s) vencem em 3 dias`,btn:'Ver',fn:"nav('validade')"});
  if (o.validade_alertas > 0)
    pend.push({cls:'alerta',ico:'⚠️',txt:`${o.validade_alertas} produto(s) vencem em 7 dias`,btn:'Ver',fn:"nav('validade')"});
  if (f.boletos_vencidos > 0)
    pend.push({cls:'critico',ico:'🔴',txt:`${f.boletos_vencidos} boleto(s) vencido(s) — ${brl(f.boletos_vencidos_valor)}`,btn:'Pagar',fn:"nav('boletos')"});
  if (f.boletos_prox7d > 0)
    pend.push({cls:'alerta',ico:'📅',txt:`${f.boletos_prox7d} boleto(s) vencem em 7 dias — ${brl(f.boletos_prox7d_valor)}`,btn:'Ver',fn:"nav('boletos')"});
  if (d.estoque.abaixo_minimo > 0)
    pend.push({cls:'alerta',ico:'📦',txt:`${d.estoque.abaixo_minimo} produto(s) abaixo do estoque mínimo`,btn:'Ver',fn:"nav('produtos')"});
  if (f.dre_pendencias > 0)
    pend.push({cls:'alerta',ico:'📊',txt:`${f.dre_pendencias} lançamento(s) DRE sem categoria`,btn:'Classificar',fn:"nav('dre')"});
  if (im.estoque.critico)
    pend.push({cls:'alerta',ico:'📥',txt:`Estoque não importado há ${im.estoque.dias} dias`,btn:'Importar',fn:"abrirImport()"});
  if (im.vendas.critico)
    pend.push({cls:'alerta',ico:'📥',txt:`Vendas não importadas há ${im.vendas.dias} dias`,btn:'Importar',fn:"abrirImport()"});
  if (pend.length === 0)
    pend.push({cls:'ok',ico:'✅',txt:'Tudo em ordem — sem pendências operacionais'});

  const pendHtml = pend.map(p =>
    `<div class="ali ${p.cls}">
      <span class="ali-ico">${p.ico}</span>
      <span class="ali-txt">${p.txt}</span>
      ${p.btn?`<button class="ali-btn" onclick="${p.fn}">${p.btn}</button>`:''}
    </div>`
  ).join('');

  // ── Importações ───────────────────────────────────────────────────────────
  const impItems = [
    {lbl:'Estoque',  ...im.estoque},
    {lbl:'Vendas',   ...im.vendas},
    {lbl:'Produtos', ...im.produtos},
    {lbl:'Boletos',  ...im.boletos},
  ];
  const impHtml = impItems.map(i => {
    const cls = i.critico?'critico':i.alerta?'alerta':'ok';
    return `<div class="imp-item ${cls}">
      <div class="imp-lbl">${i.lbl}</div>
      <div class="imp-msg">${i.msg}</div>
    </div>`;
  }).join('');

  // ── Atalhos ───────────────────────────────────────────────────────────────
  const ats = [
    {ico:'📦',lbl:'Importar Estoque',fn:"abrirImport()"},
    {ico:'💰',lbl:'Importar Vendas', fn:"abrirImport()"},
    {ico:'🗓',lbl:'Validade',        fn:"nav('validade')"},
    {ico:'📄',lbl:'Boletos',         fn:"nav('boletos')"},
    {ico:'🏭',lbl:'Fornecedor',      fn:"nav('fornecedores')"},
    {ico:'👥',lbl:'Retirada',        fn:"nav('retiradas')"},
    {ico:'🗑️',lbl:'Nova Perda',      fn:"nav('perdas')"},
    {ico:'📊',lbl:'Classificar DRE', fn:"nav('dre')"},
  ];
  const atHtml = ats.map(a =>
    `<div class="atalho" onclick="${a.fn}"><div class="at-ico">${a.ico}</div><div class="at-lbl">${a.lbl}</div></div>`
  ).join('');

  // ── Render final ─────────────────────────────────────────────────────────
  document.getElementById('content').innerHTML = `

  <div class="secao">
    <div class="sec-title">⚡ Status Operacional</div>
    <div class="semaforo">${semHtml}</div>
  </div>

  <div class="secao">${vendaHtml}</div>

  <div class="secao" id="sec-compras">
    <div class="sec-title">🛒 Compras Inteligentes — cobertura de estoque</div>
    <div class="card" id="compras-card">
      <div style="font-size:12px;color:var(--muted);padding:8px 0">⏳ Calculando sugestões...</div>
    </div>
  </div>

  <div class="secao" id="sec-criticos">
    <div class="sec-title">🏦 Módulos Críticos — Financeiro</div>
    <!-- Sprint 4.5-C: Próximas Campanhas -->
    <div class="card" id="campanhas-card">
      <div class="card-title">📅 Próximas Campanhas</div>
      <div id="campanhas-lista" style="font-size:12px;color:var(--muted)">Carregando...</div>
    </div>

    <div id="criticos-card" class="card">
      <div style="font-size:12px;color:var(--muted)">⏳ Carregando...</div>
    </div>
  </div>

  <div class="grid2">
    <div>
      <div class="secao">
        <div class="sec-title">🚨 Pendências</div>
        <div class="alert-list">${pendHtml}</div>
      </div>

      <div class="secao">
        <div class="sec-title">📥 Importações — última atualização</div>
        <div class="imp-grid">${impHtml}</div>
      </div>

      <div class="secao">
        <div class="sec-title">⚡ Atalhos Rápidos</div>
        <div class="atalhos">${atHtml}</div>
      </div>
    </div>

    <div>
      <div class="secao">
        <div class="sec-title">📥 Importar Arquivo</div>
        <div class="drop" id="drop"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="onDrop(event)"
          onclick="document.getElementById('file-input').click()">
          <div class="drop-ico">📂</div>
          <div class="drop-txt">Arraste ou clique para importar</div>
          <div class="drop-sub">Identificação automática do tipo</div>
          <div style="margin-top:7px">
            <span class="tag">XLSX</span><span class="tag">CSV</span>
            <span class="tag">OFX</span><span class="tag nfe">NF-e XML → Boletos</span>
          </div>
        </div>
        <div id="imp-status" style="margin-top:7px;display:none"></div>
      </div>

      <div class="secao">
        <div class="sec-title">📊 Operação — ${d.mes}</div>
        <div class="card">
          <div class="kpi-row">
            <div class="kpi">
              <div class="kpi-lbl">Movimentos 24h</div>
              <div class="kpi-v">${o.movimentos_24h}</div>
              <div class="kpi-s">no estoque</div>
            </div>
            <div class="kpi">
              <div class="kpi-lbl">Perdas do mês</div>
              <div class="kpi-v ${o.perdas_mes>0?'neg':''}">${brl(o.perdas_mes)}</div>
              <div class="kpi-s">${o.perdas_count} registro(s)</div>
            </div>
            <div class="kpi">
              <div class="kpi-lbl">Retiradas</div>
              <div class="kpi-v">${brl(o.retiradas_mes)}</div>
              <div class="kpi-s">${o.retiradas_count} registro(s)</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderCompras(data) {
  const el = document.getElementById('compras-card');
  if (!el) return;
  if (!data) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted)">Não foi possível calcular sugestões.</div>';
    return;
  }

  const { urgentes, breve, saudavel, janela_dias } = data;
  const total = urgentes.length + breve.length;

  if (total === 0) {
    el.innerHTML = `<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--green)">
      <span style="font-size:16px">✅</span> Estoque saudável — sem necessidade de reposição imediata
      <span style="color:var(--muted);font-size:11px">(base: últimos ${janela_dias} dias)</span>
    </div>`;
    return;
  }

  // Cards de resumo
  const cardHtml = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px">
      <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;text-align:center">
        <div style="font-size:20px">🔴</div>
        <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--red-l)">${urgentes.length}</div>
        <div style="font-size:10px;font-weight:700;color:var(--red-l);text-transform:uppercase;letter-spacing:.5px">Urgente</div>
      </div>
      <div style="background:var(--amber-bg);border:1px solid var(--amber-bdr);border-radius:8px;padding:10px 12px;text-align:center">
        <div style="font-size:20px">🟡</div>
        <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--amber)">${breve.length}</div>
        <div style="font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.5px">Em Breve</div>
      </div>
      <div style="background:var(--green-bg);border:1px solid var(--green-bdr);border-radius:8px;padding:10px 12px;text-align:center">
        <div style="font-size:20px">🟢</div>
        <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--green)">${saudavel.length}</div>
        <div style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px">Saudável</div>
      </div>
    </div>`;

  function linhasTabela(itens) {
    return itens.map(it => {
      const cobNum = it.cobertura_dias !== null ? parseFloat(it.cobertura_dias) : null;
      const cobStr = cobNum !== null ? `${cobNum}d` : '—';
      const cobCls = it.classe === 'urgente' ? 'cob-urgente'
                   : it.classe === 'breve'   ? 'cob-breve' : 'cob-saudavel';
      const medStr = it.media_diaria > 0
        ? `${it.media_diaria.toFixed(2)} ${it.unidade}/dia` : 'sem histórico';
      const sugStr = it.sugestao_compra > 0
        ? `${it.sugestao_compra.toFixed(it.sugestao_compra < 10 ? 2 : 0)} ${it.unidade}` : '—';
      // Motivo da recomendação
      let motivo = '';
      if (it.estoque < 0)                         motivo = 'Estoque negativo — importar Rel.302';
      else if (cobNum !== null && cobNum < 5)      motivo = `Cobertura de ${cobNum}d — compra imediata`;
      else if (cobNum !== null && cobNum < 15)     motivo = `Cobertura de ${cobNum}d — acionar fornecedor`;
      else if (it.estoque_minimo > 0 && it.media_diaria === 0) motivo = 'Sem histórico de vendas — abaixo do mínimo';

      return `<tr>
        <td>
          <div style="font-weight:600">${it.curva_abc?`<span style="font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;margin-right:4px;background:${it.curva_abc==='A'?'#fef9c3':it.curva_abc==='B'?'#f0fdf4':'#f3f4f6'};color:${it.curva_abc==='A'?'#92400e':it.curva_abc==='B'?'#14532d':'#6b7280'}">${it.curva_abc==='A'?'⭐ A':'✦'+it.curva_abc}</span>`:''} ${it.descricao}</div>
          ${it.fornecedor ? `<div class="fornec">🏭 ${it.fornecedor}</div>` : ''}
          ${motivo ? `<div class="fornec" style="color:var(--${it.estoque<0?'red-l':'muted'})">${motivo}</div>` : ''}
        </td>
        <td class="r" style="font-family:'DM Mono',monospace;${it.estoque < 0 ? 'color:var(--red-l);' : ''}">${it.estoque < 0 ? '⚠️ ' : ''}${Math.abs(it.estoque).toFixed(Math.abs(it.estoque) < 10 ? 2 : 0)} ${it.unidade}${it.estoque < 0 ? ' <span title="Estoque negativo: importar Rel.302 para corrigir" style="font-size:10px;color:var(--muted)">(neg)</span>' : ''}</td>
        <td class="r" style="color:var(--muted);font-size:11px">${medStr}</td>
        <td class="r"><span class="cob-pill ${cobCls}">${cobStr}</span></td>
        <td class="r" style="font-weight:600;color:var(--red-l)">${sugStr}</td>
      </tr>`;
    }).join('');
  }

  let html = '';

  if (urgentes.length > 0) {
    html += `<div class="compras-grupo">
      <div class="compras-header">
        <span style="font-size:14px">🔴</span>
        <strong style="font-size:13px">Compra Urgente</strong>
        <span class="compras-badge badge-urgente">${urgentes.length} produto(s) — cobertura &lt; 5 dias</span>
      </div>
      <div class="bb-table-wrap">
      <table class="comp-table">
        <thead><tr>
          <th>Produto</th><th class="r">Estoque</th>
          <th class="r">Média/dia</th><th class="r">Cobertura</th><th class="r">Sugestão</th>
        </tr></thead>
        <tbody>${linhasTabela(urgentes)}</tbody>
      </table>
      </div><!-- /bb-table-wrap -->
    </div>`;
  }

  if (breve.length > 0) {
    html += `<div class="compras-grupo">
      <div class="compras-header">
        <span style="font-size:14px">🟡</span>
        <strong style="font-size:13px">Comprar em Breve</strong>
        <span class="compras-badge badge-breve">${breve.length} produto(s) — cobertura 5 a 15 dias</span>
      </div>
      <div class="bb-table-wrap">
      <table class="comp-table">
        <thead><tr>
          <th>Produto</th><th class="r">Estoque</th>
          <th class="r">Média/dia</th><th class="r">Cobertura</th><th class="r">Sugestão</th>
        </tr></thead>
        <tbody>${linhasTabela(breve)}</tbody>
      </table>
      </div><!-- /bb-table-wrap -->
    </div>`;
  }

  // Limitar a 5 itens mais críticos
  const top5Urgentes = urgentes.slice(0, Math.min(5, urgentes.length));
  const top5Breve    = breve.slice(0, Math.max(0, 5 - top5Urgentes.length));

  let htmlCompacto = cardHtml;
  if (top5Urgentes.length > 0) {
    htmlCompacto += `<div class="compras-grupo">
      <div class="compras-header">
        <span style="font-size:14px">🔴</span>
        <strong style="font-size:12px">Compra Urgente</strong>
        <span class="compras-badge badge-urgente">${urgentes.length} produto(s)</span>
      </div>
      <div class="bb-table-wrap">
      <table class="comp-table">
        <thead><tr><th>Produto</th><th class="r">Estoque</th><th class="r">Cobertura</th><th class="r">Sugestão</th></tr></thead>
        <tbody>${linhasTabela(top5Urgentes)}</tbody>
      </table></div>`;
  }
  if (top5Breve.length > 0) {
    htmlCompacto += `<div class="compras-grupo">
      <div class="compras-header">
        <span style="font-size:14px">🟡</span>
        <strong style="font-size:12px">Comprar em Breve</strong>
        <span class="compras-badge badge-breve">${breve.length} produto(s)</span>
      </div>
      <div class="bb-table-wrap">
      <table class="comp-table">
        <thead><tr><th>Produto</th><th class="r">Estoque</th><th class="r">Cobertura</th><th class="r">Sugestão</th></tr></thead>
        <tbody>${linhasTabela(top5Breve)}</tbody>
      </table></div>`;
  }

  const totalCriticos = urgentes.length + breve.length;
  htmlCompacto += `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
    <span style="font-size:10px;color:var(--muted)">Base: últimos ${janela_dias} dias · mostrando top 5 de ${totalCriticos} críticos</span>
    ${totalCriticos > 5 ? `<button onclick="abrirModalCompras()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">Ver todos ${totalCriticos} →</button>` : ''}
  </div>`;

  el.innerHTML = htmlCompacto;
  // Guardar dados completos para modal
  window._dadosCompras = data;
}

    <button onclick="document.getElementById('modal-compras').style.display='none'" style="background:rgba(255,255,255,.2);border:none;border-radius:7px;color:#fff;padding:4px 10px;cursor:pointer">✕</button>
  </div>
  <div style="padding:16px;overflow-y:auto;max-height:60vh">`;

  if (urgentes.length > 0) {
    html += `<div class="compras-grupo"><div class="compras-header"><span>🔴</span><strong>Compra Urgente (${urgentes.length})</strong></div>
      <div class="bb-table-wrap">
      <table class="comp-table"><thead><tr><th>Produto</th><th class="r">Estoque</th><th class="r">Média/dia</th><th class="r">Cobertura</th><th class="r">Sugestão</th></tr></thead>
      <tbody>${linhasTabela(urgentes)}</tbody></table></div>`;
  }
  if (breve.length > 0) {
    html += `<div class="compras-grupo"><div class="compras-header"><span>🟡</span><strong>Comprar em Breve (${breve.length})</strong></div>
      <div class="bb-table-wrap">
      <table class="comp-table"><thead><tr><th>Produto</th><th class="r">Estoque</th><th class="r">Média/dia</th><th class="r">Cobertura</th><th class="r">Sugestão</th></tr></thead>
      <tbody>${linhasTabela(breve)}</tbody></table></div>`;
  }
  html += `<div style="font-size:10px;color:var(--muted);margin-top:8px">Base: últimos ${janela_dias} dias</div></div>`;

  let modal = document.getElementById('modal-compras');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'modal-compras';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
    modal.innerHTML = '<div style="background:#fff;border-radius:12px;width:100%;max-width:800px;max-height:85vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)" id="modal-compras-inner"></div>';
    modal.addEventListener('click', e => { if (e.target === modal) modal.style.display = 'none'; });
    document.body.appendChild(modal);
  }
  document.getElementById('modal-compras-inner').innerHTML = html;
  modal.style.display = 'flex';
}

function nav(tab) {
  try { window.parent.postMessage({ type:'bb_nav', tab }, '*'); } catch(_){}
}
function abrirImport() {
  document.getElementById('file-input').click();
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop').classList.remove('drag');
  if (e.dataTransfer.files[0]) onFileSelect(e.dataTransfer.files[0]);
}

function onFileSelect(file) {
  if (!file) return;
  const nome = file.name.toLowerCase();
  const ext  = nome.split('.').pop();
  const st   = document.getElementById('imp-status');
  st.style.display = '';

  if (ext === 'xml') {
    st.innerHTML = `<div class="ali alerta">
      <span class="ali-ico">⚠️</span>
      <span class="ali-txt"><strong>NF-e XML</strong> — use o módulo Boletos para importar notas fiscais</span>
      <button class="ali-btn" onclick="nav('boletos')">Ir para Boletos</button>
    </div>`;
    return;
  }

  let tipo = 'desconhecido';
  if (nome.includes('302')||nome.includes('estoque')||nome.includes('inventario')||nome.includes('inventário')||nome.includes('saldo')) tipo = 'estoque';
  else if (nome.includes('venda')||nome.includes('fatur')||nome.includes('xmenu')||nome.includes('101')||nome.includes('200')) tipo = 'vendas';
  else if (ext==='ofx') tipo = 'extrato_ofx';
  else if (nome.includes('extrato')||nome.includes('itau')||nome.includes('caixa')||nome.includes('banco')) tipo = 'extrato_xlsx';

  const rotaMap = {
    estoque:     '/api/produtos/sync-estoque',
    vendas:      '/api/faturamento/import',
    extrato_ofx: '/api/dre/upload-extrato',
    extrato_xlsx:'/api/dre/upload-extrato',
  };
  const nomeMap = {
    estoque:'📦 Relatório 302 — Estoque',
    vendas:'💰 Relatório de Vendas (XMenu)',
    extrato_ofx:'🏦 Extrato Bancário OFX',
    extrato_xlsx:'🏦 Extrato Bancário XLSX',
    desconhecido:'❓ Tipo não identificado',
  };

  const rota = rotaMap[tipo];
  const dicaDesconh = tipo==='desconhecido'
    ? '<div style="font-size:10px;margin-top:4px;color:#6b7280">💡 Renomeie o arquivo incluindo "302", "estoque", "venda" ou "extrato" para identificação automática</div>'
    : '';
  st.innerHTML = `<div class="ali ${rota?'alerta':'critico'}">
    <span class="ali-ico">📄</span>
    <div style="flex:1"><strong>${nomeMap[tipo]}</strong>${dicaDesconh}</div>
    ${rota?`<button class="ali-btn" onclick="enviar('${rota}')">Importar →</button>`:''}
  </div>`;
  window._fileToSend = file;
}

async function enviar(rota) {
  const file = window._fileToSend;
  if (!file) return;
  const st = document.getElementById('imp-status');
  st.innerHTML = `<div class="ali alerta">⏳ Enviando <strong>${file.name}</strong>...</div>`;
  try {
    const fd = new FormData(); fd.append('arquivo', file);
    const res = await (_api||BB.api).upload(rota, fd);
    if (res.ok !== false) {
      const msgExtra = res.atualizados !== undefined ? ` (${res.atualizados} produto(s) atualizados)` : '';
      st.innerHTML = `<div class="ali ok">✅ Importado com sucesso!${msgExtra}</div>`;
      // Invalidar cache do Hub para refletir novo estoque imediatamente
      try { await (_api||BB.api).get('/api/hub/invalidar-cache'); } catch(_) {}
      setTimeout(() => carregar(), 1200);
    } else {
      st.innerHTML = `<div class="ali critico">❌ ${res.erro||'Erro ao importar'}</div>`;
    }
  } catch(e) {
    st.innerHTML = `<div class="ali critico">❌ ${e.message}</div>`;
  }
}

// Recebe eventos do barramento
window.addEventListener('message', e => {
  // Formato do portal: { type:'bb_data_changed', evento:{ type:'dre_atualizado' } }
  const ev = e.data?.evento?.type || e.data?.bbEvent || e.data?.type;
  if (['PERDA_REGISTRADA','VALIDADE_DESCARTADA','ESTOQUE_ATUALIZADO',
       'MOVIMENTO_ESTOQUE','FATURAMENTO_ATUALIZADO','BOLETO_PAGO',
       'dre_atualizado','faturamento_atualizado','boletos_atualizado'].includes(ev)) {
    clearTimeout(window._hubTimer);
    window._hubTimer = setTimeout(async () => {
      // Invalidar cache do servidor antes de recarregar
      try { await (_api||BB.api).get('/api/hub/invalidar-cache'); } catch(_) {}
      carregar();
    }, 2500);
  }
});

// Sprint 4.5-C — Próximas Campanhas
async function carregarCampanhasHub() {
  var el = document.getElementById('campanhas-lista');
  if(!el) return;
  try {
    var api2 = _api || (window.BB && window.BB.api);
    var res = await api2.get('/api/kits-campanha/calendario?apenas_pendentes=1');
    if(!res.ok || !res.data || !res.data.length) { el.textContent='Nenhuma campanha próxima'; return; }
    var sopIco   = {compra_urgente:'🔴',planejamento_pendente:'🟠',orcamento_pendente:'🟡',pronto:'🟢',finalizado:'⚫'};
    var sopLabel = {compra_urgente:'Compra urgente',planejamento_pendente:'Planejamento pendente',orcamento_pendente:'Orçamento pendente',pronto:'Pronto',finalizado:'Finalizado'};
    el.innerHTML = res.data.slice(0,5).map(function(c){
      var ico  = sopIco[c.status_op]  || '🔵';
      var lbl  = sopLabel[c.status_op] || c.status_op || '';
      var dias = c.dias_ate_limite!==null ? (c.dias_ate_limite<=0?'hoje / passou':'faltam '+c.dias_ate_limite+'d') : '';
      return '<div style="padding:6px 0;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center">'
        +'<div><strong style="font-size:12px">'+c.nome+'</strong>'
        +(dias?'<div style="font-size:10px;color:var(--muted)">'+dias+'</div>':'')+'</div>'
        +'<span style="font-size:11px;font-weight:600">'+ico+' '+lbl+'</span></div>';
    }).join('');
  } catch(e2) { el.textContent='—'; }
}
