<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meu RH — Bom Beef</title>
<style>
:root {
  --red:    #8B0000;
  --red-l:  #c0392b;
  --green:  #16a34a;
  --orange: #e8a020;
  --bg:     #f7f4f0;
  --white:  #ffffff;
  --border: #e8e0d8;
  --text:   #1a1a1a;
  --muted:  #888;
  --card:   #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
header {
  background: var(--red);
  color: #fff;
  padding: 14px 16px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
header .h-icon { font-size: 26px; }
header .h-info h1 { font-size: 16px; font-weight: 700; }
header .h-info p  { font-size: 11px; opacity: .75; margin-top: 1px; }
header .h-user {
  margin-left: auto;
  text-align: right;
  font-size: 11px;
  opacity: .85;
}
header .h-user strong { display: block; font-size: 13px; }

/* Tabs */
.tabs {
  display: flex;
  background: var(--white);
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  flex: 1;
  min-width: 100px;
  padding: 11px 8px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: all .15s;
}
.tab.active { color: var(--red); border-bottom-color: var(--red); }

/* Content */
.tab-content { display: none; padding: 14px 12px; }
.tab-content.active { display: block; }

/* Mês nav */
.mes-nav {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  background: var(--white);
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
}
.mes-nav input[type=month] {
  flex: 1;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  background: var(--bg);
}
.btn-nav {
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 700;
}

/* Cards resumo */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.kpi {
  background: var(--white);
  border-radius: 12px;
  padding: 14px 12px;
  border: 1px solid var(--border);
  text-align: center;
}
.kpi .k-val { font-size: 18px; font-weight: 800; margin: 4px 0 2px; }
.kpi .k-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.kpi.k-green .k-val { color: var(--green); }
.kpi.k-red   .k-val { color: var(--red-l); }
.kpi.k-orange .k-val { color: var(--orange); }
.kpi.k-blue  .k-val { color: #1d4ed8; }

/* Total destacado */
.total-card {
  background: var(--green);
  color: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.total-card.neg { background: var(--red-l); }
.total-card .tc-label { font-size: 13px; font-weight: 600; opacity: .9; }
.total-card .tc-val   { font-size: 22px; font-weight: 800; }

/* Cards lançamentos */
.lanc-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.lanc-card.aprovado { border-left: 4px solid var(--green); }
.lanc-card.pendente { border-left: 4px solid var(--orange); }
.lanc-card.rejeitado { border-left: 4px solid var(--red-l); }
.lanc-info { flex: 1; }
.lanc-tipo  { font-size: 13px; font-weight: 700; }
.lanc-meta  { font-size: 11px; color: var(--muted); margin-top: 3px; }
.lanc-desc  { font-size: 12px; margin-top: 4px; }
.lanc-motivo { font-size: 11px; color: var(--red-l); margin-top: 4px; }
.lanc-val   { font-size: 16px; font-weight: 800; white-space: nowrap; }

/* Pills */
.pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  margin-left: 6px;
}
.pill-pend  { background: #fef9c3; color: #92400e; }
.pill-aprov { background: #dcfce7; color: #15803d; }
.pill-rejei { background: #fee2e2; color: #b91c1c; }

/* Seção detalhe ficha */
.ficha-section {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
}
.ficha-section-head {
  background: #f7f4f0;
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}
.ficha-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.ficha-row:last-child { border-bottom: none; }
.ficha-row.total-row {
  background: #f0faf4;
  font-weight: 700;
  font-size: 15px;
}
.ficha-row.neg-row { background: #fff8f8; }
.ficha-row .fr-val { font-weight: 700; }
.ficha-row .fr-val.pos { color: var(--green); }
.ficha-row .fr-val.neg { color: var(--red-l); }

/* Botão principal */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary:active { background: var(--red-l); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 500;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--white);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 0;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header {
  background: var(--red);
  color: #fff;
  padding: 16px 18px;
  border-radius: 20px 20px 0 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 700; }
.modal-close {
  background: rgba(255,255,255,.2);
  border: none;
  color: #fff;
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.modal-body  { padding: 18px; }
.modal-footer {
  padding: 14px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}

/* Form */
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--muted);
  margin-bottom: 5px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 11px 13px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  background: var(--white);
  font-family: inherit;
}
.form-group input:focus,
.form-group select:focus { outline: none; border-color: var(--red); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.calc-preview {
  background: #f0faf4;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  margin-top: 6px;
  display: none;
}
.calc-preview strong { color: var(--green); font-size: 16px; }

.info-box {
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 12px;
  color: #1e40af;
  margin-top: 12px;
}

.btn-cancel {
  flex: 1;
  padding: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
}
.btn-submit {
  flex: 2;
  padding: 12px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.btn-submit:disabled { opacity: .5; }

/* Empty / loading */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
}
.empty-state .e-icon { font-size: 44px; margin-bottom: 12px; }
.empty-state p { font-size: 13px; }
.loading-state {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: 13px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1a1a1a;
  color: #fff;
  padding: 10px 22px;
  border-radius: 24px;
  font-size: 13px;
  z-index: 9999;
  transition: transform .25s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Sem vínculo */
.alert-box {
  background: #fef9c3;
  border: 1px solid #fde68a;
  border-radius: 10px;
  padding: 14px;
  font-size: 13px;
  color: #78350f;
  text-align: center;
  margin-bottom: 14px;
}
.alert-box.danger { background: #fee2e2; border-color: #fca5a5; color: #7f1d1d; }
</style>
</head>
<body>

<header>
  <div class="h-icon">🧑‍💼</div>
  <div class="h-info">
    <h1>Meu RH</h1>
    <p>Apontamentos & Contracheque</p>
  </div>
  <div class="h-user">
    <strong id="h-nome">—</strong>
    <span id="h-cargo"></span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('lanc')">📝 Lançamentos</button>
  <button class="tab" onclick="showTab('resumo')">💰 Meu Mês</button>
  <button class="tab" onclick="showTab('hist')">📋 Histórico</button>
</div>

<!-- ── ABA: LANÇAMENTOS ── -->
<div id="tab-lanc" class="tab-content active">
  <div class="mes-nav">
    <button class="btn-nav" onclick="mesAnterior()">◀</button>
    <input type="month" id="sel-mes" onchange="onMesChange()">
    <button class="btn-nav" onclick="mesProximo()">▶</button>
  </div>

  <div id="sem-vinculo" class="alert-box danger" style="display:none">
    ⚠️ Seu usuário não está vinculado a um funcionário.<br>
    Fale com o administrador para fazer o vínculo.
  </div>

  <div id="lanc-area">
    <button class="btn-primary" onclick="abrirModal()">
      <span>＋</span> Novo Lançamento
    </button>

    <div id="lanc-container">
      <div class="loading-state">Carregando...</div>
    </div>
  </div>
</div>

<!-- ── ABA: MEU MÊS ── -->
<div id="tab-resumo" class="tab-content">
  <div class="mes-nav">
    <button class="btn-nav" onclick="mesAnteriorR()">◀</button>
    <input type="month" id="sel-mes-r" onchange="carregarFicha()">
    <button class="btn-nav" onclick="mesProximoR()">▶</button>
  </div>
  <div id="resumo-container">
    <div class="loading-state">Carregando...</div>
  </div>
</div>

<!-- ── ABA: HISTÓRICO ── -->
<div id="tab-hist" class="tab-content">
  <div class="mes-nav" style="margin-bottom:14px">
    <input type="month" id="sel-mes-h" onchange="carregarHistorico()" style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px">
  </div>
  <div id="hist-container">
    <div class="loading-state">Carregando...</div>
  </div>
</div>

<!-- ── MODAL NOVO LANÇAMENTO ── -->
<div class="modal-overlay" id="modal-lanc">
  <div class="modal-box">
    <div class="modal-header">
      <h3>📝 Novo Lançamento</h3>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Tipo *</label>
          <select id="lanc-tipo" onchange="atualizarCampos()">
            <option value="hora_extra">⏱️ Hora Extra</option>
            <option value="adicional_noturno">🌙 Ad. Noturno</option>
            <option value="falta">❌ Falta</option>
            <option value="comissao">💰 Comissão</option>
            <option value="bonus">🎁 Bônus</option>
            <option value="desconto">↘️ Desconto</option>
            <option value="outro">📌 Outro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Data de Referência</label>
          <input type="date" id="lanc-data">
        </div>
      </div>
      <div class="form-group">
        <label>Descrição / Motivo *</label>
        <input type="text" id="lanc-desc" placeholder="Ex: Hora extra dia 15/04, cobertura de turno...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label id="lanc-qtd-label">Quantidade (horas)</label>
          <input type="number" id="lanc-qtd" step="0.5" min="0" placeholder="0" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label id="lanc-vunit-label">Valor Unitário (R$)</label>
          <input type="number" id="lanc-vunit" step="0.01" min="0" placeholder="0,00" oninput="calcTotal()">
        </div>
      </div>
      <div id="lanc-calc" class="calc-preview">
        Total: <strong id="lanc-vtotal">R$ 0,00</strong>
      </div>
      <div class="info-box">
        ℹ️ Seu lançamento ficará <strong>pendente</strong> até o admin aprovar.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-submit" id="btn-enviar" onclick="enviarLancamento()">📤 Enviar para Aprovação</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const BASE = window.location.origin;
let _token    = '';
let _funcId   = null;
let _nome     = '';
let _cargo    = '';
let _perfil   = '';
let _inited   = false;

// ── Auth / postMessage ───────────────────────────────────────────────────────
function getToken() {
  return _token || sessionStorage.getItem('bb_token') || localStorage.getItem('bb_token') || '';
}

window.addEventListener('message', e => {
  if (e.data?.type === 'bb_token' && e.data.token) {
    _token = e.data.token;
    sessionStorage.setItem('bb_token', e.data.token);
    if (!_inited) { _inited = true; init(); }
  }
  if (e.data?.type === 'bb_request_auth') {
    const t = getToken();
    if (t && !_inited) { _inited = true; init(); }
  }
});

// ── API helpers ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  if (r.status === 401) {
    sessionStorage.removeItem('bb_token');
    try { window.parent.postMessage({ type: 'bb_logout' }, '*'); } catch(_) {}
    return { ok: false, erro: 'Sessão expirada' };
  }
  return r.json().catch(() => ({ ok: false, erro: 'Erro de rede' }));
}
const get  = p     => api('GET', p);
const post = (p,b) => api('POST', p, b);

// ── Helpers ──────────────────────────────────────────────────────────────────
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function brl(v) { return 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function ymToMes(ym) { const [y,m] = ym.split('-'); return `${m}/${y}`; }
function mesLabel(ym) { const [y,m] = ym.split('-'); return `${MESES[parseInt(m)-1]} ${y}`; }
function fmtData(s) {
  if (!s) return '—';
  const d = String(s).slice(0,10);
  if (d.length < 10) return '—';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}
function toast(msg, dur=3200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
function showTab(t) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const btn = document.querySelector(`.tab[onclick="showTab('${t}')"]`);
  if (btn) btn.classList.add('active');
  document.getElementById('tab-'+t)?.classList.add('active');
  if (t === 'lanc')   carregarLanc();
  if (t === 'resumo') carregarFicha();
  if (t === 'hist')   carregarHistorico();
}
function fecharModal() {
  document.getElementById('modal-lanc').classList.remove('open');
}

// ── Navegação mês ─────────────────────────────────────────────────────────────
function _navMes(selId, delta) {
  const sel = document.getElementById(selId);
  const [y,m] = sel.value.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  sel.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  return sel.value;
}
function mesAnterior()  { _navMes('sel-mes', -1); carregarLanc(); }
function mesProximo()   { _navMes('sel-mes',  1); carregarLanc(); }
function mesAnteriorR() { _navMes('sel-mes-r', -1); carregarFicha(); }
function mesProximoR()  { _navMes('sel-mes-r',  1); carregarFicha(); }
function onMesChange()  { carregarLanc(); }

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  const hoje = new Date();
  const ym   = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('sel-mes').value   = ym;
  document.getElementById('sel-mes-r').value = ym;
  document.getElementById('sel-mes-h').value = ym;

  // Decodifica JWT para obter nome/cargo/perfil
  try {
    const tk = getToken();
    if (tk) {
      const payload = JSON.parse(atob(tk.split('.')[1]));
      _perfil = payload.perfil || '';
      const email = payload.email || payload.nome || '';

      // Busca funcionários e tenta vincular pelo email ou nome
      const funcs = await get('/api/rh/funcionarios');
      if (funcs.ok && funcs.data?.length) {
        const match = funcs.data.find(f =>
          (f.email && f.email.toLowerCase() === email.toLowerCase()) ||
          (f.nome  && email && email.toLowerCase().includes(f.nome.split(' ')[0].toLowerCase()))
        );
        if (match) {
          _funcId = match.id;
          _nome   = match.nome;
          _cargo  = match.cargo || '';
        }
      }
    }
  } catch(e) { console.warn('[rh-func] init error', e); }

  document.getElementById('h-nome').textContent  = _nome || 'Funcionário';
  document.getElementById('h-cargo').textContent = _cargo;

  if (!_funcId) {
    document.getElementById('sem-vinculo').style.display = '';
    document.getElementById('lanc-area').style.display   = 'none';
    document.getElementById('lanc-container').innerHTML  = '';
  } else {
    carregarLanc();
  }
}

// ── Aba Lançamentos ──────────────────────────────────────────────────────────
async function carregarLanc() {
  if (!_funcId) return;
  const ym  = document.getElementById('sel-mes').value;
  const mes = ymToMes(ym);
  const c   = document.getElementById('lanc-container');
  c.innerHTML = '<div class="loading-state">Carregando...</div>';

  const d = await get(`/api/rh/meus-lancamentos?mes_ref=${encodeURIComponent(mes)}&funcionario_id=${_funcId}`);
  if (!d.ok) { c.innerHTML = `<div class="empty-state"><div class="e-icon">⚠️</div><p>${d.erro}</p></div>`; return; }

  if (!d.data?.length) {
    c.innerHTML = `<div class="empty-state"><div class="e-icon">📝</div><p>Nenhum lançamento em ${mesLabel(ym)}.<br>Clique em <strong>+ Novo Lançamento</strong>.</p></div>`;
    return;
  }

  const tipoLabel = { hora_extra:'⏱️ Hora Extra', adicional_noturno:'🌙 Ad. Noturno', falta:'❌ Falta', comissao:'💰 Comissão', bonus:'🎁 Bônus', desconto:'↘️ Desconto', outro:'📌 Outro' };

  c.innerHTML = d.data.map(a => {
    const pill = { pendente:'<span class="pill pill-pend">⏳ Aguardando</span>', aprovado:'<span class="pill pill-aprov">✅ Aprovado</span>', rejeitado:'<span class="pill pill-rejei">❌ Rejeitado</span>' }[a.status] || '';
    const isNeg = a.tipo === 'falta' || a.tipo === 'desconto';
    return `<div class="lanc-card ${a.status}">
      <div class="lanc-info">
        <div class="lanc-tipo">${tipoLabel[a.tipo]||a.tipo} ${pill}</div>
        <div class="lanc-meta">${a.mes_ref}${a.data_ref ? ' · ' + fmtData(a.data_ref) : ''}</div>
        ${a.descricao ? `<div class="lanc-desc">${a.descricao}</div>` : ''}
        ${a.motivo_rejeicao ? `<div class="lanc-motivo">Motivo: ${a.motivo_rejeicao}</div>` : ''}
      </div>
      <div class="lanc-val" style="color:${isNeg ? 'var(--red-l)' : 'var(--green)'}">
        ${isNeg ? '−' : '+'}${brl(a.valor_total)}
      </div>
    </div>`;
  }).join('');
}

// ── Modal novo lançamento ────────────────────────────────────────────────────
function abrirModal() {
  const hoje = new Date().toISOString().slice(0,10);
  document.getElementById('lanc-data').value  = hoje;
  document.getElementById('lanc-desc').value  = '';
  document.getElementById('lanc-qtd').value   = '';
  document.getElementById('lanc-vunit').value = '';
  document.getElementById('lanc-tipo').value  = 'hora_extra';
  document.getElementById('lanc-calc').style.display = 'none';
  document.getElementById('btn-enviar').disabled = false;
  document.getElementById('btn-enviar').textContent = '📤 Enviar para Aprovação';
  atualizarCampos();
  document.getElementById('modal-lanc').classList.add('open');
}

function atualizarCampos() {
  const tipo = document.getElementById('lanc-tipo').value;
  const qL   = document.getElementById('lanc-qtd-label');
  const vL   = document.getElementById('lanc-vunit-label');
  const qtdW = document.getElementById('lanc-qtd').closest('.form-group');
  if (tipo === 'falta')   { qL.textContent='Quantidade (dias)'; vL.textContent='Desconto por dia (R$)'; }
  else if (tipo === 'comissao' || tipo === 'bonus' || tipo === 'outro' || tipo === 'desconto') {
    qL.textContent='Quantidade'; vL.textContent='Valor (R$)';
  } else if (tipo === 'adicional_noturno') {
    qL.textContent='Horas noturnas'; vL.textContent='Valor por hora (R$)';
  } else {
    qL.textContent='Quantidade (horas)'; vL.textContent='Valor por hora (R$)';
  }
  calcTotal();
}

function calcTotal() {
  const qtd   = parseFloat(document.getElementById('lanc-qtd').value) || 0;
  const vunit = parseFloat(document.getElementById('lanc-vunit').value) || 0;
  const total = qtd * vunit;
  const el    = document.getElementById('lanc-calc');
  if (total > 0) {
    el.style.display = '';
    document.getElementById('lanc-vtotal').textContent = brl(total);
  } else {
    el.style.display = 'none';
  }
}

async function enviarLancamento() {
  if (!_funcId) { toast('⚠️ Usuário sem vínculo com funcionário'); return; }
  const tipo         = document.getElementById('lanc-tipo').value;
  const descricao    = document.getElementById('lanc-desc').value.trim();
  const quantidade   = parseFloat(document.getElementById('lanc-qtd').value) || 0;
  const valor_unit   = parseFloat(document.getElementById('lanc-vunit').value) || 0;
  const data_ref     = document.getElementById('lanc-data').value;
  const mes_ref      = ymToMes(document.getElementById('sel-mes').value);

  if (!descricao)            { toast('⚠️ Informe a descrição / motivo'); return; }
  if (!quantidade||!valor_unit) { toast('⚠️ Informe quantidade e valor'); return; }

  const btn = document.getElementById('btn-enviar');
  btn.disabled = true;
  btn.textContent = '⏳ Enviando...';

  const d = await post('/api/rh/lancamento', {
    funcionario_id: _funcId,
    mes_ref, tipo, descricao,
    quantidade, valor_unitario: valor_unit, data_ref
  });

  btn.disabled = false;
  btn.textContent = '📤 Enviar para Aprovação';

  if (!d.ok) { toast('❌ ' + d.erro); return; }
  toast('✅ Enviado para aprovação!');
  fecharModal();
  carregarLanc();
}

// ── Aba Meu Mês (ficha) ──────────────────────────────────────────────────────
async function carregarFicha() {
  if (!_funcId) {
    document.getElementById('resumo-container').innerHTML =
      '<div class="empty-state"><div class="e-icon">🔗</div><p>Usuário não vinculado a funcionário.</p></div>';
    return;
  }
  const ym  = document.getElementById('sel-mes-r').value;
  const mes = ymToMes(ym);
  const c   = document.getElementById('resumo-container');
  c.innerHTML = '<div class="loading-state">Carregando...</div>';

  const d = await get(`/api/rh/ficha?funcionario_id=${_funcId}&mes=${encodeURIComponent(mes)}`);
  if (!d.ok) { c.innerHTML = `<div class="empty-state"><div class="e-icon">⚠️</div><p>${d.erro}</p></div>`; return; }

  const ficha   = d.ficha   || {};
  const func    = d.funcionario || {};
  const apont   = d.apontamentos || [];
  const pgtos   = d.pagamentos   || [];
  const retir   = parseFloat(d.total_retiradas || 0);

  const salBase  = parseFloat(ficha.salario_base  || func.salario_base  || 0);
  const va       = parseFloat(ficha.vale_aliment  || func.vale_alimentacao || 0);

  // Calcula acréscimos (apontamentos positivos)
  const acres = apont.filter(a => !['falta','desconto'].includes(a.tipo))
    .reduce((s,a) => s + parseFloat(a.valor_total||0), 0);
  const descs = apont.filter(a =>  ['falta','desconto'].includes(a.tipo))
    .reduce((s,a) => s + parseFloat(a.valor_total||0), 0);
  const extras = pgtos.reduce((s,p) => s + parseFloat(p.valor||0), 0);
  const liquido = salBase + va + acres + extras - descs - retir;

  // Pendentes no mês
  const lancPend = await get(`/api/rh/meus-lancamentos?mes_ref=${encodeURIComponent(mes)}&funcionario_id=${_funcId}`);
  const pendentes = (lancPend.data||[]).filter(l => l.status === 'pendente').length;
  const aprovados = (lancPend.data||[]).filter(l => l.status === 'aprovado').length;

  // KPIs
  let html = `
    <div class="kpi-grid">
      <div class="kpi k-blue">
        <div class="k-lbl">Salário Base</div>
        <div class="k-val">${brl(salBase)}</div>
      </div>
      <div class="kpi k-green">
        <div class="k-lbl">Vale Alimentação</div>
        <div class="k-val">${brl(va)}</div>
      </div>
      <div class="kpi k-green">
        <div class="k-lbl">Acréscimos</div>
        <div class="k-val">${brl(acres)}</div>
      </div>
      <div class="kpi k-orange">
        <div class="k-lbl">Extras</div>
        <div class="k-val">${brl(extras)}</div>
      </div>
    </div>`;

  // Total a receber
  html += `
    <div class="total-card ${liquido < 0 ? 'neg' : ''}">
      <div>
        <div class="tc-label">💰 A Receber em ${mesLabel(ym)}</div>
        ${pendentes ? `<div style="font-size:11px;opacity:.8;margin-top:3px">⏳ ${pendentes} lançamento(s) pendente(s)</div>` : ''}
      </div>
      <div class="tc-val">${brl(liquido)}</div>
    </div>`;

  // Detalhamento
  html += `
    <div class="ficha-section">
      <div class="ficha-section-head">💰 Detalhamento do Mês</div>
      <div class="ficha-row"><span>Salário Base</span><span class="fr-val">${brl(salBase)}</span></div>
      <div class="ficha-row"><span>Vale Alimentação</span><span class="fr-val">${brl(va)}</span></div>
      ${acres > 0 ? `<div class="ficha-row"><span>Acréscimos (horas extras etc.)</span><span class="fr-val pos">+ ${brl(acres)}</span></div>` : ''}
      ${extras > 0 ? `<div class="ficha-row"><span>Extras (entregas, grelhados etc.)</span><span class="fr-val pos">+ ${brl(extras)}</span></div>` : ''}
      ${descs > 0 ? `<div class="ficha-row neg-row"><span>Descontos / Faltas</span><span class="fr-val neg">− ${brl(descs)}</span></div>` : ''}
      ${retir > 0 ? `<div class="ficha-row neg-row"><span>Retiradas do mês</span><span class="fr-val neg">− ${brl(retir)}</span></div>` : ''}
      <div class="ficha-row total-row"><span>💰 Total a Receber</span><span class="fr-val" style="color:${liquido>=0?'var(--green)':'var(--red-l)'}">${brl(liquido)}</span></div>
    </div>`;

  // Apontamentos aprovados no mês
  const aprvLancs = (lancPend.data||[]).filter(l => l.status === 'aprovado');
  if (aprvLancs.length) {
    const tipoLabel = { hora_extra:'⏱️ Hora Extra', adicional_noturno:'🌙 Ad. Noturno', falta:'❌ Falta', comissao:'💰 Comissão', bonus:'🎁 Bônus', desconto:'↘️ Desconto', outro:'📌 Outro' };
    html += `
      <div class="ficha-section">
        <div class="ficha-section-head">✅ Lançamentos Aprovados</div>
        ${aprvLancs.map(l => `
          <div class="ficha-row">
            <span>${tipoLabel[l.tipo]||l.tipo}${l.descricao ? ' — ' + l.descricao : ''}</span>
            <span class="fr-val ${['falta','desconto'].includes(l.tipo)?'neg':'pos'}">${['falta','desconto'].includes(l.tipo)?'−':'+'}${brl(l.valor_total)}</span>
          </div>`).join('')}
      </div>`;
  }

  // Observação da ficha
  if (ficha.observacao) {
    html += `<div class="ficha-section">
      <div class="ficha-section-head">📌 Observação do admin</div>
      <div style="padding:12px 14px;font-size:13px;color:var(--muted)">${ficha.observacao}</div>
    </div>`;
  }

  c.innerHTML = html;
}

// ── Aba Histórico ─────────────────────────────────────────────────────────────
async function carregarHistorico() {
  if (!_funcId) {
    document.getElementById('hist-container').innerHTML =
      '<div class="empty-state"><div class="e-icon">🔗</div><p>Usuário não vinculado.</p></div>';
    return;
  }
  const ym  = document.getElementById('sel-mes-h').value;
  const mes = ymToMes(ym);
  const c   = document.getElementById('hist-container');
  c.innerHTML = '<div class="loading-state">Carregando...</div>';

  const d = await get(`/api/rh/meus-lancamentos?mes_ref=${encodeURIComponent(mes)}&funcionario_id=${_funcId}`);
  if (!d.ok) { c.innerHTML = `<div class="empty-state"><div class="e-icon">⚠️</div><p>${d.erro}</p></div>`; return; }
  if (!d.data?.length) {
    c.innerHTML = `<div class="empty-state"><div class="e-icon">📋</div><p>Nenhum lançamento em ${mesLabel(ym)}.</p></div>`;
    return;
  }

  const tipoLabel = { hora_extra:'⏱️ Hora Extra', adicional_noturno:'🌙 Ad. Noturno', falta:'❌ Falta', comissao:'💰 Comissão', bonus:'🎁 Bônus', desconto:'↘️ Desconto', outro:'📌 Outro' };
  const total = d.data.reduce((s,l) => {
    const neg = ['falta','desconto'].includes(l.tipo);
    return s + (neg ? -1 : 1) * parseFloat(l.valor_total||0);
  }, 0);

  c.innerHTML = `
    <div class="total-card ${total<0?'neg':''}">
      <div class="tc-label">Total em ${mesLabel(ym)}</div>
      <div class="tc-val">${brl(Math.abs(total))}</div>
    </div>
    ${d.data.map(a => {
      const pill = { pendente:'<span class="pill pill-pend">⏳</span>', aprovado:'<span class="pill pill-aprov">✅</span>', rejeitado:'<span class="pill pill-rejei">❌</span>' }[a.status] || '';
      const isNeg = ['falta','desconto'].includes(a.tipo);
      return `<div class="lanc-card ${a.status}">
        <div class="lanc-info">
          <div class="lanc-tipo">${tipoLabel[a.tipo]||a.tipo} ${pill}</div>
          <div class="lanc-meta">${a.mes_ref}${a.data_ref ? ' · ' + fmtData(a.data_ref) : ''}</div>
          ${a.descricao ? `<div class="lanc-desc">${a.descricao}</div>` : ''}
          ${a.motivo_rejeicao ? `<div class="lanc-motivo">Motivo: ${a.motivo_rejeicao}</div>` : ''}
        </div>
        <div class="lanc-val" style="color:${isNeg?'var(--red-l)':'var(--green)'}">
          ${isNeg?'−':'+'}${brl(a.valor_total)}
        </div>
      </div>`;
    }).join('')}`;
}

// ── Arranque ─────────────────────────────────────────────────────────────────
if (getToken()) { _inited = true; init(); }
else {
  try { window.parent.postMessage({ type: 'bb_request_auth' }, '*'); } catch(_) {}
  setTimeout(() => { if (!_inited && getToken()) { _inited = true; init(); } }, 800);
}
</script>
