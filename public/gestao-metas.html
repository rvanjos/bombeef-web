<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Metas — Bom Beef</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="/js/api.js"></script>
<style>
:root{
  --red:#8B0000;--red-l:#C0392B;--bg:#f7f4f0;--white:#fff;
  --text:#1a1a1a;--muted:#7a7068;--border:#e8e0d8;
  --green:#15803d;--green-bg:#f0fdf4;--green-bdr:#bbf7d0;
  --amber:#92400e;--amber-bg:#fffbeb;--amber-bdr:#fcd34d;
  --blue:#1e3a8a;--blue-bg:#eff6ff;--blue-bdr:#bfdbfe;
  --shadow:0 2px 8px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);}
body{display:flex;flex-direction:column;overflow-y:auto;}
.ph{background:var(--red);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(139,0,0,.2);}
.ph h2{font-family:'Playfair Display',serif;font-size:16px;color:#fff;flex:1;}
.content{padding:20px;flex:1;}

/* Cards KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:20px;}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);border-left:4px solid var(--border);}
.kpi.verde{border-left-color:var(--green);}
.kpi.amber{border-left-color:#d97706;}
.kpi.azul{border-left-color:var(--blue);}
.kpi.roxo{border-left-color:#7c3aed;}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;}
.kpi-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;margin:3px 0;color:var(--text);}
.kpi-sub{font-size:11px;color:var(--muted);}

/* Formulário */
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:var(--muted);margin-bottom:14px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.form-grid.cinco{grid-template-columns:repeat(5,1fr);}
.fg{display:flex;flex-direction:column;gap:4px;}
label{font-size:12px;font-weight:600;color:var(--text);}
label .opt{font-weight:400;color:var(--muted);font-size:11px;}
input[type=text],input[type=number],input[type=month],textarea{
  padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;
  font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);
  transition:border .15s;width:100%;
}
input:focus,textarea:focus{outline:none;border-color:var(--red);}
.hint{font-size:11px;color:var(--muted);margin-top:2px;}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-p{background:var(--red);color:#fff;}.btn-p:hover{background:var(--red-l);}
.btn-s{background:var(--white);color:var(--text);border:1px solid var(--border);}.btn-s:hover{border-color:var(--red);color:var(--red);}

/* Tabela histórico */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#f7f4f0;font-size:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:2px solid var(--border);}
th.right,td.right{text-align:right;}
td{padding:9px 12px;border-bottom:1px solid #f5efe8;vertical-align:middle;}
tr:hover td{background:#fdf9f7;}
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;}
.badge-ok{background:var(--green-bg);color:var(--green);}
.badge-warn{background:var(--amber-bg);color:var(--amber);}
.badge-danger{background:#fef2f2;color:var(--red-l);}
.badge-empty{background:#f3f4f6;color:#6b7280;}
.barra-wrap{width:80px;background:#f0ebe4;border-radius:3px;height:7px;display:inline-block;overflow:hidden;vertical-align:middle;}
.barra-fill{height:100%;border-radius:3px;transition:width .4s;}

/* Aviso unificação */
.info-banner{background:var(--blue-bg);border:1px solid var(--blue-bdr);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:16px;display:flex;gap:8px;align-items:flex-start;}
.future-types{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.future-type{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px 12px;opacity:.6;}
.future-type .ft-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;}
.future-type .ft-val{font-size:13px;color:var(--muted);margin-top:2px;font-style:italic;}
</style>
</head>
<body>

<div class="ph">
  <span style="font-size:18px">🎯</span>
  <h2>Gestão de Metas</h2>
  <button class="btn btn-p" onclick="abrirForm()" style="padding:5px 14px;font-size:12px">+ Nova Meta</button>
</div>


<div class="content">
